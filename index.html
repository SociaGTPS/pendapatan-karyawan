<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEAM MP 7000 - CONTROL PANEL</title>
    <style>
        :root {
            /* Palette Merah Putih Elegan & Profesional */
            --bg-color: #f4f7f6;
            --white-card: #ffffff;
            --steam-red: #c62828; 
            --steam-red-hover: #b71c1c;
            --steam-gold: #d4af37; 
            --text-dark: #263238; 
            --text-muted: #78909c; 
            --success-color: #1b5e20; 
            --border-color: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background-color: var(--bg-color);
            background-image: linear-gradient(135deg, #fff5f5 0%, #f4f7f6 50%, #ffffff 100%);
            color: var(--text-dark); 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 550px; }

        /* HEADER BRAND - MERAH PUTIH ELEGAN */
        .app-header { 
            text-align: center;
            margin-bottom: 30px; 
            border-bottom: 3px solid var(--steam-gold); 
            padding-bottom: 20px; 
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            padding-top: 20px;
        }
        .app-header h1 { 
            color: var(--steam-red);
            font-size: 32px; 
            font-weight: 900; 
            letter-spacing: 1.5px; 
            text-transform: uppercase;
        }
        .app-header h1 span { 
            color: #ffffff;
            background: var(--steam-red); 
            padding: 3px 12px; 
            border-radius: 6px; 
            margin-left: 5px;
        }
        .app-header p { 
            color: #455a64;
            font-size: 13px; 
            font-weight: 700; 
            margin-top: 10px; 
            text-transform: uppercase; 
            letter-spacing: 2px;
        }
        
        /* CARD UTAMA */
        .card {
            background-color: var(--white-card);
            border-radius: 16px; 
            padding: 30px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            border: 2px solid var(--steam-gold); 
            margin-bottom: 25px; 
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content:'';
            position: absolute; top:0; left:0; width: 100%; height: 6px;
            background: linear-gradient(90deg, var(--steam-red) 0%, var(--steam-gold) 50%, var(--steam-red) 100%);
        }

        h2 { 
            font-size: 18px;
            margin-bottom: 25px; 
            text-align: center; 
            text-transform: uppercase; 
            color: var(--steam-red); 
            font-weight: 700;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        /* FORM FIELD */
        .form-group { margin-bottom: 20px; }
        label { 
            display: block;
            font-size: 12px; 
            text-transform: uppercase; 
            color: var(--steam-red); 
            margin-bottom: 8px; 
            font-weight: 700;
        }
        input, select, textarea { 
            width: 100%;
            padding: 14px; 
            background-color: #fbfbfb; 
            border: 1.5px solid var(--border-color); 
            border-radius: 10px; 
            color: var(--text-dark); 
            font-size: 15px;
            transition: all 0.3s ease;
        }
        input:focus, select:focus, textarea:focus { 
            outline: none;
            border-color: var(--steam-red); 
            background-color: #fff; 
            box-shadow: 0 0 10px rgba(198, 40, 40, 0.08);
        }
        input:disabled, select:disabled {
            background-color: #eeeeee;
            color: #455a64;
            font-weight: bold;
            cursor: not-allowed;
            border-color: var(--steam-gold);
        }
        
        /* TOMBOL UTAMA */
        .btn {
            width: 100%;
            padding: 16px; 
            background: linear-gradient(135deg, var(--steam-red) 0%, #a01f1f 100%); 
            border: 2px solid var(--steam-gold); 
            border-radius: 12px; 
            color: white; 
            font-weight: 700; 
            text-transform: uppercase;
            font-size: 15px;
            cursor: pointer; 
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(198, 40, 40, 0.15);
        }
        .btn:hover {
            background: linear-gradient(135deg, #b71c1c 0%, var(--steam-red) 100%);
            transform: translateY(-2px);
        }
        .btn:disabled { background: #bdbdbd !important; border-color: #9e9e9e !important; color: #f5f5f5; cursor: not-allowed; transform: none; box-shadow: none; }

        /* TABS NAVIGASI */
        .nav-tabs { display: flex; gap: 12px; margin-bottom: 25px; flex-wrap: wrap; }
        .tab-btn { 
            flex: 1;
            min-width: 100px; padding: 14px; 
            background-color: #fff; 
            border: 1.5px solid var(--border-color); 
            color: var(--text-dark); 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 12px;
            text-transform: uppercase; 
        }
        .tab-btn.active { 
            background-color: var(--steam-red);
            color: #ffffff; 
            border-color: var(--steam-red);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* PESAN STATUS */
        #statusMessage { padding: 16px; border-radius: 12px; text-align: center; font-size: 14px; margin-bottom: 20px; display: none; font-weight: 600; }
        .status-success { background-color: #e8f5e9; color: var(--success-color); border: 1px solid #a5d6a7; }
        .status-error { background-color: #ffebee; color: var(--steam-red); border: 1px solid #ef9a9a; }
        .status-loading { background-color: #fff3e0; color: #e65100; border: 1px solid #ffcc80; }
        
        #areaGaji { display: none; }

        /* STYLING TABEL LAPORAN */
        .table-laporan { width:100%; font-size:14px; text-align:left; border-collapse:collapse; background:#fff; border-radius:8px; overflow:hidden; }
        .table-laporan th { background-color: #f8fbfd; padding:12px; color:var(--steam-red); font-weight:700; text-transform:uppercase; font-size:11px; border-bottom:2px solid var(--border-color); }
        .table-laporan td { padding:14px 12px; border-bottom:1px solid #eee; color:var(--text-dark); }
    </style>
</head>
<body>

    <div class="container">
        <div class="app-header">
            <h1>STEAM <span>MP 7000</span></h1>
            <p>JUJUR DISIPLIN DAN TANGGUNG JAWAB</p>
        </div>
        
        <div id="statusMessage"></div>

        <div id="boxFiturBersama" style="display:none; gap: 12px; margin-bottom: 25px;">
            <button type="button" class="btn" style="background: linear-gradient(135deg, #d32f2f 0%, #b71c1c 100%); border-color: #ff8a80; margin-top: 0; flex: 1;" onclick="triggerSOS()">🚨 SOS DARURAT</button>
            <button type="button" class="btn" style="background: linear-gradient(135deg, #1976d2 0%, #0d47a1 100%); border-color: #90caf9; margin-top: 0; flex: 1;" onclick="bukaPengaduan()">📝 LAPOR PENGADUAN</button>
        </div>

        <div id="areaGaji"></div>

        <div id="gerbangAuth">
            <div id="boxLogin" class="card">
                <h2>VERIFIKASI AKSES ANGGOTA</h2>
                <form id="formLogin" onsubmit="handleAuth(event)">
                    <div class="form-group">
                        <label>ID KARYAWAN (USERNAME)</label>
                        <input type="number" id="login_user" placeholder="Masukkan ID Anda" required>
                    </div>
                    <div class="form-group">
                        <label>KATA SANDI KEAMANAN</label>
                        <input type="password" id="login_sandi" placeholder="Masukkan Sandi" required>
                    </div>
                    <button type="submit" id="btn_login" class="btn">MASUK PANDU KONTROL</button>
                </form>
            </div>
        </div>

        <div id="halamanUtama" style="display: none;">
            
            <div id="boxFiturKT" style="display:none; margin-bottom:20px;">
                <button type="button" class="btn" style="background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%); border-color:#a5d6a7;" onclick="cekPendapatanKTPribadi()">💰 CEK LAPORAN PENDAPATAN PRIBADI SAYA</button>
            </div>

            <div id="boxFiturOwner" style="display:none; margin-bottom:20px;">
                <button type="button" class="btn" style="background: linear-gradient(135deg, var(--steam-gold) 0%, #b89020 100%); color:#fff; border-color: #fff;" onclick="bukaRekapOwner()">🔄 SEGARKAN NERACA KEUANGAN KESELURUHAN OWNER</button>
                <button type="button" class="btn" style="background: linear-gradient(135deg, #ff9100 0%, #ff6d00 100%); color:#fff; border-color: #fff; margin-top: 10px;" onclick="resetGajiOwner()">⚠️ RESET SEMUA DATA GAJI KARYAWAN</button>
            </div>

            <div class="nav-tabs" id="menuNavigasi">
                <button id="nav_pemasukan" class="tab-btn" onclick="switchTab('input-pemasukan')">Pemasukan</button>
                <button id="nav_pengeluaran" class="tab-btn" onclick="switchTab('input-pengeluaran')">Pengeluaran</button>
            </div>

            <div id="input-pemasukan" class="tab-content">
                <div class="card">
                    <h2>INPUT UNIT CUCIAN <span id="labelCabangKT" style="color:var(--steam-red); display:block; font-size:12px; margin-top:5px; font-weight: bold;"></span></h2>
                    <form id="formPemasukan" onsubmit="submitData(event, 'Pemasukan')">
                        <div class="form-group">
                            <label>Tanggal Operasional</label>
                            <input type="date" id="tgl_pemasukan" required>
                        </div>
                        <div class="form-group">
                            <label>Lokasi Cabang</label>
                            <select id="cabang_pemasukan" required onchange="filterKaryawanBerdasarkanCabang()">
                                <option value="Cabang Grobogan">Cabang Grobogan (Target: 100)</option>
                                <option value="Cabang Palis">Cabang Palis (Target: 50)</option>
                                <option value="Cabang Cayur">Cabang Cayur (Target: 50)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Anggota Yang Mencuci (Hanya Cabang Terkait)</label>
                            <select id="karyawan_pemasukan" required>
                                <option value="">-- Memuat Data Anggota --</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-bottom: 5px;">
                            <label>Jumlah Unit (Motor)</label>
                            <input type="number" id="unit_pemasukan" placeholder="Masukkan total motor" oninput="hitungKotorEstimasi()" required>
                        </div>

                        <div id="notifTargetBawahUnit" style="display: none; font-size: 13px; font-weight: bold; color: #aa7c11; background: #fffde7; border: 1.5px dashed #d4af37; padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: center;">
                            🌟 Selamat! Target Cabang Hari Ini Tembus, Bos! JOSS! 🚀
                        </div>

                        <div class="form-group">
                            <label>Estimasi Pendapatan Anggota (Rp3.000 / Unit)</label>
                            <input type="text" id="nominal_pemasukan_display" value="Rp 0" disabled style="font-weight:bold; color: var(--success-color); background: #f1f8e9; border-color:#c5e1a5;">
                        </div>
                        <div class="form-group">
                            <label>Uang Tips Pelanggan (Manual)</label>
                            <input type="number" id="tips_pemasukan" placeholder="Isi 0 jika tidak ada" value="0" required>
                        </div>
                        <div class="form-group">
                            <label>Potongan Kasbon Anggota (Manual)</label>
                            <input type="number" id="kasbon_pemasukan" placeholder="Isi 0 jika tidak ada" value="0" required>
                        </div>
                        <div class="form-group">
                            <label>Iuran Wifi Harian</label>
                            <input type="text" value="Rp 1.000 (Dipotong Otomatis)" disabled style="color:var(--steam-red); font-weight:bold; background:#fff5f5;">
                        </div>
                        <div class="form-group">
                            <label>Catatan Lapangan (Opsional)</label>
                            <textarea id="ket_pemasukan" rows="2" placeholder="Keterangan tambahan..."></textarea>
                        </div>
                        <button type="submit" id="btn_submit_pemasukan" class="btn">KIRIM FINAL DATA PEMASUKAN</button>
                    </form>
                </div>
            </div>

            <div id="input-pengeluaran" class="tab-content">
                <div class="card">
                    <h2>INPUT BIAYA OPERASIONAL TOKO</h2>
                    <form id="formPengeluaran" onsubmit="submitData(event, 'Pengeluaran')">
                        <div class="form-group">
                            <label>Tanggal Pengeluaran</label>
                            <input type="date" id="tgl_pengeluaran" required>
                        </div>
                        <div class="form-group">
                            <label>Lokasi Cabang</label>
                            <select id="cabang_pengeluaran" required>
                                <option value="Cabang Grobogan">Cabang Grobogan</option>
                                <option value="Cabang Palis">Cabang Palis</option>
                                <option value="Cabang Cayur">Cabang Cayur</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Kategori Alokasi Dana</label>
                            <select id="kategori_pengeluaran" required>
                                <option value="Beras Karyawan">Beras Karyawan</option>
                                <option value="Kopi Karyawan">Kopi Karyawan</option>
                                <option value="Listrik Token">Listrik Token</option>
                                <option value="Sabun">Sabun</option>
                                <option value="Maintenance">Maintenance</option>
                                <option value="Perawatan">Perawatan</option>
                                <option value="Oli">Oli</option>
                                <option value="Wifi">Wifi</option>
                                <option value="Lain-lain">Lain-lain</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Nominal Dana Keluar (Rp)</label>
                            <input type="number" id="nominal_pengeluaran" placeholder="Contoh: 50000" required>
                        </div>
                        <div class="form-group">
                            <label>Deskripsi Detail Pembelian (Wajib Jelas)</label>
                            <textarea id="ket_pengeluaran" rows="2" placeholder="Beli apa, merk apa..." required></textarea>
                        </div>
                        <button type="submit" id="btn_submit_pengeluaran" class="btn">KIRIM FINAL DATA PENGELUARAN</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        // URL WEB APP TERBARU SINKRON SESUAI DENGAN AKSI BARU DEPLOYMENT
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyCHnkFRly_CHcwSixKyLpi2wzbZmLPJIdk-qORUWanqq-t36pdSuOLNnDlwZDDj76X/exec";
        let SESSION_USER = null;
        let ARRAY_KARYAWAN = [];

        window.onload = function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('tgl_pemasukan').value = today;
            document.getElementById('tgl_pengeluaran').value = today;
        };

        function loadKaryawanDropdown() {
            fetch(WEB_APP_URL + "?action=getKaryawanList")
            .then(res => res.json())
            .then(res => {
                if(res.status === "success") {
                    ARRAY_KARYAWAN = res.data.filter(k => k.jabatan !== "Owner" && k.jabatan !== "Admin");
                    filterKaryawanBerdasarkanCabang();
                }
            });
        }

        function filterKaryawanBerdasarkanCabang() {
            let cabangTerpilih = document.getElementById('cabang_pemasukan').value;
            let dropdownKaryawan = document.getElementById('karyawan_pemasukan');
            
            dropdownKaryawan.innerHTML = '<option value="">-- Pilih Karyawan --</option>';
            let karyawanCabangIni = ARRAY_KARYAWAN.filter(k => {
                if (SESSION_USER && (SESSION_USER.jabatan === "Admin" || SESSION_USER.jabatan === "Owner")) {
                    return String(k.cabang).trim().toLowerCase() === String(cabangTerpilih).trim().toLowerCase();
                } else {
                    return String(k.cabang).trim().toLowerCase() === String(SESSION_USER.cabang).trim().toLowerCase();
                }
            });
            if(karyawanCabangIni.length === 0) {
                dropdownKaryawan.innerHTML = '<option value="">❌ Tidak ada karyawan di cabang ini</option>';
                return;
            }

            karyawanCabangIni.forEach(k => {
                dropdownKaryawan.innerHTML += `<option value="${k.id}">${k.nama} [${k.jabatan}]</option>`;
            });
        }

        function handleAuth(event) {
            event.preventDefault();
            document.getElementById('btn_login').disabled = true;
            showStatus("Melakukan verifikasi data...", "loading");

            let user = document.getElementById('login_user').value;
            let sandi = document.getElementById('login_sandi').value;
            let url = `${WEB_APP_URL}?action=loginUser&username=${encodeURIComponent(user)}&sandi=${encodeURIComponent(sandi)}`;
            fetch(url)
            .then(res => res.json())
            .then(data => {
                document.getElementById('btn_login').disabled = false;
                if(data.status === "success") {
                    SESSION_USER = data;
             
                    showStatus("Akses dibuka. Selamat datang " + data.nama, "success");
                    document.getElementById('gerbangAuth').style.display = 'none';
                    
                    // AKTIFKAN BOX SOS DAN PENGADUAN UNTUK SEMUA JABATAN
                    document.getElementById('boxFiturBersama').style.display = 'flex';

                    document.getElementById('cabang_pemasukan').disabled = false;
                    document.getElementById('cabang_pengeluaran').disabled = false;
                    
                    document.getElementById('labelCabangKT').innerText = "";

                    if(data.jabatan === "Karyawan") {
                        document.getElementById('halamanUtama').style.display = 'none';
                        document.getElementById('areaGaji').style.display = 'block';
                       
                        tampilkanRincianGajiKaryawan(data.gaji, data.nama, data.jabatan);
                    } 
                    else if(data.jabatan === "Kepala Toko") {
                        document.getElementById('halamanUtama').style.display = 'block';
                        document.getElementById('boxFiturKT').style.display = 'block'; 
                        document.getElementById('boxFiturOwner').style.display = 'none';
                        document.getElementById('nav_pengeluaran').style.display = 'none'; 
                        
                        if(data.cabang) {
                            document.getElementById('cabang_pemasukan').value = data.cabang;
                            document.getElementById('cabang_pemasukan').disabled = true; 
                            document.getElementById('labelCabangKT').innerText = "📌 TERKUNCI KHUSUS: " + data.cabang.toUpperCase();
                        }

                        loadKaryawanDropdown();
                        switchTab('input-pemasukan');
                    } 
                    else if(data.jabatan === "Admin" || data.jabatan === "Owner") {
                        document.getElementById('halamanUtama').style.display = 'block';
                        document.getElementById('menuNavigasi').style.display = 'flex';
                        document.getElementById('boxFiturOwner').style.display = 'block';
                        document.getElementById('boxFiturKT').style.display = 'none';
                        loadKaryawanDropdown();
                        switchTab('input-pemasukan');
                        bukaRekapOwner();
                    }
                } else {
                    showStatus(data.message, "error");
                }
            }).catch(() => {
                document.getElementById('btn_login').disabled = false;
                if(SESSION_USER && SESSION_USER.jabatan === "Kepala Toko") {
                    document.getElementById('cabang_pemasukan').disabled = true;
                }
                showStatus("Koneksi gagal. Periksa sinyal internet Anda.", "error");
            });
        }

        // ====== SOS SYSTEM ======
        function triggerSOS() {
            if(!SESSION_USER) return;
            if(!confirm("🚨 KIRIM SINYAL SOS DARURAT KE SERVER UTAMA SEKARANG?")) return;
            showStatus("Mengirim sinyal darurat...", "loading");
            fetch(WEB_APP_URL, { 
                method: "POST", 
                body: new URLSearchParams({
                    tipe: "sendSOS", 
                    idPelapor: SESSION_USER.idUser, 
                    namaPelapor: SESSION_USER.nama, 
                    cabang: SESSION_USER.cabang || "Tidak Terdeteksi", 
                    isi: "PERMINTAAN BANTUAN SEGERA DI LOKASI!"
                }) 
            })
            .then(() => {
                showStatus("🚨 Sinyal SOS Darurat Berhasil Terkirim!", "success");
            }).catch(() => {
                showStatus("Sinyal SOS Terkirim.", "success");
            });
        }

        // ====== LAPOR PENGADUAN ======
        function bukaPengaduan() {
            if(!SESSION_USER) return;
            let isi = prompt("Masukkan keluhan, kendala lapangan, atau pengaduan secara jelas:");
            if(!isi) return;
            
            showStatus("Mengirim pengaduan...", "loading");
            fetch(WEB_APP_URL, { 
                method: "POST", 
                body: new URLSearchParams({
                    tipe: "submitPengaduan", 
                    idPelapor: SESSION_USER.idUser, 
                    namaPelapor: SESSION_USER.nama, 
                    cabang: SESSION_USER.cabang || "Tidak Terdeteksi", 
                    jenis: "Umum", 
                    isi: isi
                }) 
            })
            .then(() => {
                showStatus("📝 Laporan berhasil masuk ke database Owner.", "success");
            }).catch(() => {
                showStatus("Laporan pengaduan terkirim.", "success");
            });
        }

        // ====== OWNER RESET GAJI ======
        function resetGajiOwner() {
            if(!confirm("⚠️ PERINGATAN KERAS! Anda yakin ingin menghapus seluruh rekapan gaji berjalan di cloud? Tindakan ini TIDAK BISA dibatalkan!")) return;
            showStatus("Mereset data kas...", "loading");
            fetch(`${WEB_APP_URL}?action=resetGaji`)
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    showStatus("🔄 Seluruh data gaji harian berhasil direset!", "success");
                    bukaRekapOwner();
                } else {
                    showStatus("Gagal melakukan reset.", "error");
                }
            }).catch(() => {
                showStatus("Permintaan reset berhasil diproses.", "success");
                bukaRekapOwner();
            });
        }

        function bukaRekapOwner() {
            showStatus("Menghitung seluruh kas utama owner dari Sheet1...", "loading");
            fetch(WEB_APP_URL + "?action=getLaporanOwner")
            .then(res => res.json())
            .then(res => {
                showStatus("Database kas berhasil disinkronkan.", "success");
                let targetBox = document.getElementById('areaGaji');
                targetBox.style.display = "block";

                let hitungTotalSeluruhUnit = 0;
                let listGajiHtml = "";
                
                for (let namaK in res.rekapKaryawan) {
                    let unitKaryawan = res.rekapKaryawan[namaK].totalUnit || 0;
                    let gajiBerjalan = res.rekapKaryawan[namaK].gaji || 0;
                    
                    hitungTotalSeluruhUnit += unitKaryawan;
                    
                    listGajiHtml += `<tr style="border-bottom:1px solid #eee;"> 
                        <td style="padding:10px;">${namaK} <span style="font-size:11px; color:#78909c;">(${unitKaryawan} Unit)</span></td> 
                        <td style="padding:10px; font-weight:bold; text-align:right; color:var(--steam-red);">Rp ${gajiBerjalan.toLocaleString('id-ID')}</td> 
                    </tr>`;
                }
                
                if(listGajiHtml === "") listGajiHtml = "<tr><td colspan='2' style='text-align:center; padding:10px; color:#999;'>Belum ada data pendapatan berjalan</td></tr>";

                let kotorOwnerTerbaru = hitungTotalSeluruhUnit * 4000;
                let bersihOwnerTerbaru = kotorOwnerTerbaru - (res.pengeluaran || 0);

                targetBox.innerHTML = `
                    <div class="card" style="background: #ffffff; border: 2px solid var(--steam-gold); margin-bottom: 25px; padding: 20px;">
                        <h3 style="color:var(--steam-red); font-size:13px; border-left:4px solid var(--steam-gold); padding-left:10px; margin-bottom:15px; text-transform:uppercase;">📊 NERACA TOTAL KAS UTAMA OWNER (Porsi Rp4.000 - Keseluruhan)</h3>
                        <table style="width:100%; font-size:14px; text-align:left; border-collapse:collapse; margin-bottom:20px;">
                            <tr style="border-bottom:1px solid #eee;"><td style="padding:10px; color:#555;">Total Akumulasi Cucian</td><td style="padding:10px; font-weight:bold; text-align:right; color:var(--text-dark);">${hitungTotalSeluruhUnit} Unit</td></tr>
                            <tr style="border-bottom:1px solid #eee;"><td style="padding:10px; color:#555;">Total Pemasukan Kotor Owner (Unit x Rp4.000)</td><td style="padding:10px; font-weight:bold; color:#2e7d32; text-align:right;">Rp ${kotorOwnerTerbaru.toLocaleString('id-ID')}</td></tr>
                            <tr style="border-bottom:1px solid #eee;"><td style="padding:10px; color:#555;">Total Seluruh Pengeluaran Toko</td><td style="padding:10px; font-weight:bold; color:var(--steam-red); text-align:right;">- Rp ${(res.pengeluaran || 0).toLocaleString('id-ID')}</td></tr>
                            <tr style="background:#fff5f5; font-weight:bold;"><td style="padding:12px; border-radius:6px 0 0 6px; color:var(--text-dark);">PROFIT BERSIH SAYA SEKARANG</td><td style="padding:12px; text-align:right; border-radius:0 6px 6px 0; color:var(--success-color); font-size:16px;">Rp ${bersihOwnerTerbaru.toLocaleString('id-ID')}</td></tr>
                        </table>
                        
                        <h3 style="color:var(--text-dark); font-size:13px; border-left:4px solid var(--steam-red); padding-left:10px; margin-bottom:10px; text-transform:uppercase;">👥 REKAP GAJI BERJALAN KARYAWAN</h3>
                        <table class="table-laporan">
                            ${listGajiHtml}
                        </table>
                    </div>`;
            }).catch(() => {
                showStatus("Gagal menyinkronkan data owner harian.", "error");
            });
        }

        function cekPendapatanKTPribadi() {
            showStatus("Menarik data pendapatan pribadi Anda...", "loading");
            fetch(`${WEB_APP_URL}?action=loginUser&username=${encodeURIComponent(document.getElementById('login_user').value)}&sandi=${encodeURIComponent(document.getElementById('login_sandi').value)}`)
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    showStatus("Seluruh riwayat data pribadi dimuat.", "success");
                    let targetBox = document.getElementById('areaGaji');
                    targetBox.style.display = 'block';
                    tampilkanRincianGajiKaryawan(data.gaji, data.nama, data.jabatan);
                    targetBox.scrollIntoView({ behavior: 'smooth' });
                } else {
                    showStatus("Gagal memperbarui data.", "error");
                }
            }).catch(() => {
                showStatus("Masalah jaringan.", "error");
            });
        }

        function tampilkanRincianGajiKaryawan(dataGaji, nama, jabatan) {
            let targetBox = document.getElementById('areaGaji');
            if(!dataGaji || dataGaji.length === 0) {
                targetBox.innerHTML = `<div class="card" style="text-align:center; padding:30px;"><p style="color:var(--steam-red); font-weight:bold; font-size:16px;">Halo ${nama},</p><p style="font-size:13px; margin-top:5px; color:#666;">Anda belum memiliki riwayat pendapatan di sistem.</p></div>`;
                return;
            }

            let totalUnit = 0, totalTips = 0, totalBonus = 0, totalKasbon = 0;
            let totalHariKerja = dataGaji.length;
            let barisTabelHtml = "";

            dataGaji.forEach(item => {
                let u = parseInt(item.unit) || 0;
                let t = parseInt(item.tips) || 0;
                let b = parseInt(item.bonus) || 0;
                let k = parseInt(item.kasbon) || 0;
                
                totalUnit += u;
                totalTips += t;
                totalBonus += b;
                totalKasbon += k;

                let upahCuci = u * 3000;
                let potonganWifi = 1000; 
                let totalBersihHarian = (upahCuci + t + b) - k - potonganWifi;

                barisTabelHtml += `
                    <tr style="border-bottom: 1px solid #e0e0e0; font-size: 13px;">
                        <td style="padding: 10px 6px; font-weight: 600; color: #37474f;">${item.tglTampilan}</td>
                        <td style="padding: 10px 6px; text-align: center;">${u}</td>
                        <td style="padding: 10px 6px; text-align: right; color:#2e7d32;">${t.toLocaleString('id-ID')}</td>
                        <td style="padding: 10px 6px; text-align: right; color:#aa7c11; font-weight:600;">${b.toLocaleString('id-ID')}</td>
                        <td style="padding: 10px 6px; text-align: right; color:var(--steam-red);">- ${k.toLocaleString('id-ID')}</td>
                        <td style="padding: 10px 6px; text-align: right; font-weight: bold; color: #1b5e20;">Rp ${totalBersihHarian.toLocaleString('id-ID')}</td>
                    </tr>
                `;
            });

            let akumulasiGajiKotorUnit = totalUnit * 3000; 
            let akumulasiPotonganWifi = totalHariKerja * 1000;
            let akumulasiTerimaBersihFinal = (akumulasiGajiKotorUnit + totalTips + totalBonus) - totalKasbon - akumulasiPotonganWifi;

            targetBox.innerHTML = `
                <div class="card" style="margin-bottom: 20px; padding: 20px;">
                    <h3 style="color:var(--steam-red); font-size:14px; border-left:4px solid var(--steam-gold); padding-left:10px; margin-bottom:4px; text-transform:uppercase;">TOTAL AKUMULASI PENDAPATAN ANGGOTA</h3>
                    <p style="font-size:13px; color:#555; margin-bottom:15px;">Nama Anggota: <span style="color:var(--text-dark); font-weight:bold;">${nama} [${jabatan}]</span></p>
                    <table style="width:100%; font-size:14px; text-align:left; border-collapse:collapse;">
                        <tr style="border-bottom:1px solid #eee;"><td style="padding:8px 0; color:#666;">Total Motor Dicuci</td><td style="padding:8px 0; font-weight:bold; text-align:right;">${totalUnit} Unit</td></tr>
                        <tr style="border-bottom:1px solid #eee;"><td style="padding:8px 0; color:#666;">Total Upah Cuci (x3.000)</td><td style="padding:8px 0; text-align:right; font-weight:600;">Rp ${akumulasiGajiKotorUnit.toLocaleString('id-ID')}</td></tr>
                        <tr style="border-bottom:1px solid #eee;"><td style="padding:8px 0; color:#2e7d32;">Total Tips Masuk</td><td style="padding:8px 0; color:#2e7d32; text-align:right; font-weight:600;">+ Rp ${totalTips.toLocaleString('id-ID')}</td></tr>
                        <tr style="border-bottom:1px solid #eee;"><td style="padding:8px 0; color:#aa7c11;">Total Bonus Target (${jabatan === 'Kepala Toko' ? 'Rp10k' : 'Rp5k'}/Tembus)</td><td style="padding:8px 0; color:#aa7c11; font-weight:bold; text-align:right;">+ Rp ${totalBonus.toLocaleString('id-ID')}</td></tr>
                        <tr style="border-bottom:1px solid #eee;"><td style="padding:8px 0; color:var(--steam-red);">Total Potongan Kasbon</td><td style="padding:8px 0; color:var(--steam-red); text-align:right; font-weight:600;">- Rp ${totalKasbon.toLocaleString('id-ID')}</td></tr>
                        <tr style="border-bottom:1px solid #ddd;"><td style="padding:8px 0; color:#666;">Total Iuran Wifi (${totalHariKerja} Hari)</td><td style="padding:8px 0; color:var(--steam-red); text-align:right;">- Rp ${akumulasiPotonganWifi.toLocaleString('id-ID')}</td></tr>
                        <tr style="background:#f1f8e9; font-weight:bold; font-size:16px;"><td style="padding:12px; border-radius:4px 0 0 4px; color:var(--text-dark);">TOTAL PENDAPATAN BERSIH</td><td style="padding:12px; text-align:right; border-radius:0 4px 4px 0; color:var(--success-color);">Rp ${akumulasiTerimaBersihFinal.toLocaleString('id-ID')}</td></tr>
                    </table>
                </div>

                <div class="card" style="padding: 20px; overflow-x: auto;">
                    <h3 style="color:var(--text-dark); font-size:13px; border-left:4px solid var(--steam-red); padding-left:10px; margin-bottom:15px; text-transform:uppercase;">📜 LOG RINCIAN PENDAPATAN PER TANGGAL</h3>
                    <table style="width:100%; border-collapse:collapse; min-width:450px;">
                        <thead>
                            <tr style="background:#f8fbfd; border-bottom:2px solid var(--border-color); font-size:11px; text-align:center; font-weight:bold; color:var(--steam-red);">
                                <th style="padding:10px 4px; text-align:left;">TANGGAL</th>
                                <th style="padding:10px 4px;">UNIT</th>
                                <th style="padding:10px 4px; text-align:right;">TIPS</th>
                                <th style="padding:10px 4px; text-align:right;">BONUS</th>
                                <th style="padding:10px 4px; text-align:right;">KASBON</th>
                                <th style="padding:10px 4px; text-align:right;">BERSIH</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${barisTabelHtml}
                        </tbody>
                    </table>
                </div>`;
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).style.display = 'block';
            if(tabId === 'input-pemasukan') document.getElementById('nav_pemasukan').classList.add('active');
            if(tabId === 'input-pengeluaran') document.getElementById('nav_pengeluaran').classList.add('active');
        }

        function hitungKotorEstimasi() {
            let unitInput = document.getElementById('unit_pemasukan').value;
            let unit = unitInput ? parseInt(unitInput) : 0;
            let total = unit * 3000;
            document.getElementById('nominal_pemasukan_display').value = "Rp " + total.toLocaleString('id-ID');

            let cabangTerpilih = document.getElementById('cabang_pemasukan').value;
            let batasanTarget = 50;
            if (cabangTerpilih === "Cabang Grobogan") batasanTarget = 100;
            if (cabangTerpilih === "Cabang Palis") batasanTarget = 50;
            if (cabangTerpilih === "Cabang Cayur") batasanTarget = 50;

            let boxNotifTarget = document.getElementById('notifTargetBawahUnit');
            if (unit >= batasanTarget) {
                boxNotifTarget.style.display = "block";
            } else {
                boxNotifTarget.style.display = "none";
            }
        }

        function showStatus(text, type) {
            const msgBox = document.getElementById('statusMessage');
            msgBox.innerText = text; msgBox.className = '';
            if(type === 'success') msgBox.classList.add('status-success');
            else if(type === 'error') msgBox.classList.add('status-error');
            else if(type === 'loading') msgBox.classList.add('status-loading');
            msgBox.style.display = 'block';
            if(type !== 'loading') { setTimeout(() => { msgBox.style.display = 'none'; }, 4000); }
        }

        function submitData(event, tipeForm) {
            event.preventDefault();
            let btnSubmit = (tipeForm === 'Pemasukan') ? document.getElementById('btn_submit_pemasukan') : document.getElementById('btn_submit_pengeluaran');
            btnSubmit.disabled = true;
            showStatus("Menyimpan data aman ke Sheet1 cloud...", "loading");
            document.getElementById('cabang_pemasukan').disabled = false;

            let urlParams = new URLSearchParams();
            urlParams.append("action", "insertRow");
            urlParams.append("tipe", tipeForm);
            const formatTanggalSistem = (idInput) => {
                let d = new Date(document.getElementById(idInput).value);
                return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth()+1).padStart(2, '0')}/${d.getFullYear()}`;
            };

            if(tipeForm === 'Pemasukan') {
                let idK = document.getElementById('karyawan_pemasukan').value;
                let objK = ARRAY_KARYAWAN.find(x => String(x.id) === String(idK));

                urlParams.append("tanggal", formatTanggalSistem('tgl_pemasukan'));
                urlParams.append("cabang", document.getElementById('cabang_pemasukan').value);
                urlParams.append("kategori", "Pemasukan Unit");
                urlParams.append("unit", document.getElementById('unit_pemasukan').value);
                urlParams.append("keterangan", document.getElementById('ket_pemasukan').value);
                urlParams.append("karyawan_id", idK);
                urlParams.append("karyawan_nama", objK.nama);
                urlParams.append("karyawan_jabatan", objK.jabatan);
                urlParams.append("tips", document.getElementById('tips_pemasukan').value);
                urlParams.append("kasbon", document.getElementById('kasbon_pemasukan').value);
                urlParams.append("operator_id", SESSION_USER.idUser);
            } else {
                urlParams.append("tanggal", formatTanggalSistem('tgl_pengeluaran'));
                urlParams.append("cabang", document.getElementById('cabang_pengeluaran').value);
                urlParams.append("kategori", document.getElementById('kategori_pengeluaran').value);
                urlParams.append("nominal", document.getElementById('nominal_pengeluaran').value);
                urlParams.append("keterangan", document.getElementById('ket_pengeluaran').value);
            }

            fetch(WEB_APP_URL, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: urlParams.toString()
            })
            .then(res => res.text())
            .then(resText => {
                btnSubmit.disabled = false;
                
                if(SESSION_USER && SESSION_USER.jabatan === "Kepala Toko") {
                    document.getElementById('cabang_pemasukan').disabled = true;
                }

                if(resText === "SUCCESS" || resText === "SUCCESS_TARGET") {
                    showStatus("Data Berhasil Disimpan ke Sheet1!", "success");
                    document.getElementById('notifTargetBawahUnit').style.display = "none";

                    if(tipeForm === 'Pemasukan') {
                        document.getElementById('formPemasukan').reset();
                        document.getElementById('nominal_pemasukan_display').value = "Rp 0";
                        if(SESSION_USER && SESSION_USER.jabatan === "Kepala Toko") {
                            document.getElementById('cabang_pemasukan').value = SESSION_USER.cabang;
                        }
                        filterKaryawanBerdasarkanCabang();
                    } else {
                        document.getElementById('formPengeluaran').reset();
                    }
                    
                    const today = new Date().toISOString().split('T')[0];
                    document.getElementById('tgl_pemasukan').value = today;
                    document.getElementById('tgl_pengeluaran').value = today;

                    if(SESSION_USER.jabatan === "Owner" || SESSION_USER.jabatan === "Admin") {
                        bukaRekapOwner();
                    }
                } else {
                    showStatus("Gagal memproses ke database cloud.", "error");
                }
            }).catch(() => {
                btnSubmit.disabled = false;
                if(SESSION_USER && SESSION_USER.jabatan === "Kepala Toko") {
                    document.getElementById('cabang_pemasukan').disabled = true;
                }
                showStatus("Gagal menghubungi server.", "error");
            });
        }
    </script>
</body>
</html>

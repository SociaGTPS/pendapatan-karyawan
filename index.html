<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEAM MP 7000 - CONTROL PANEL</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --white-card: #ffffff;
            --steam-red: #c62828; 
            --steam-red-hover: #b71c1c;
            --steam-gold: #d4af37; 
            --text-dark: #263238; 
            --text-muted: #78909c; 
            --success-color: #1b5e20; 
            --border-color: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background-color: var(--bg-color);
            background-image: linear-gradient(135deg, #fff5f5 0%, #f4f7f6 50%, #ffffff 100%);
            color: var(--text-dark); 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding-bottom: 90px; 
        }

        .container { width: 100%; max-width: 550px; }

        .app-header { 
            text-align: center;
            margin-bottom: 30px; 
            border-bottom: 3px solid var(--steam-gold); 
            padding-bottom: 20px; 
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            padding-top: 20px;
        }
        .app-header h1 { 
            color: var(--steam-red);
            font-size: 32px; 
            font-weight: 900; 
            letter-spacing: 1.5px; 
            text-transform: uppercase;
        }
        .app-header h1 span { 
            color: #ffffff;
            background: var(--steam-red); 
            padding: 3px 12px; 
            border-radius: 6px; 
            margin-left: 5px;
        }
        .app-header p { 
            color: #455a64;
            font-size: 13px; 
            font-weight: 700; 
            margin-top: 10px; 
            text-transform: uppercase; 
            letter-spacing: 2px;
        }
        
        .card {
            background-color: var(--white-card);
            border-radius: 16px; 
            padding: 30px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            border: 2px solid var(--steam-gold); 
            margin-bottom: 25px; 
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content:'';
            position: absolute; top:0; left:0; width: 100%; height: 6px;
            background: linear-gradient(90deg, var(--steam-red) 0%, var(--steam-gold) 50%, var(--steam-red) 100%);
        }

        h2 { 
            font-size: 18px;
            margin-bottom: 25px; 
            text-align: center; 
            text-transform: uppercase; 
            color: var(--steam-red); 
            font-weight: 700;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .form-group { margin-bottom: 20px; }
        label { 
            display: block;
            font-size: 12px; 
            text-transform: uppercase; 
            color: var(--steam-red); 
            margin-bottom: 8px; 
            font-weight: 700;
        }
        input, select, textarea { 
            width: 100%;
            padding: 14px; 
            background-color: #fbfbfb; 
            border: 1.5px solid var(--border-color); 
            border-radius: 10px; 
            color: var(--text-dark); 
            font-size: 15px;
            transition: all 0.3s ease;
        }
        input:focus, select:focus, textarea:focus { 
            outline: none;
            border-color: var(--steam-red); 
            background-color: #fff; 
            box-shadow: 0 0 10px rgba(198, 40, 40, 0.08);
        }
        input:disabled, select:disabled {
            background-color: #eeeeee;
            color: #455a64;
            font-weight: bold;
            cursor: not-allowed;
            border-color: var(--steam-gold);
        }
        
        .btn {
            width: 100%;
            padding: 16px; 
            background: linear-gradient(135deg, var(--steam-red) 0%, #a01f1f 100%); 
            border: 2px solid var(--steam-gold); 
            border-radius: 12px; 
            color: white; 
            font-weight: 700; 
            text-transform: uppercase;
            font-size: 15px;
            cursor: pointer; 
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(198, 40, 40, 0.15);
            margin-bottom: 8px;
        }
        .btn:hover {
            background: linear-gradient(135deg, #b71c1c 0%, var(--steam-red) 100%);
            transform: translateY(-2px);
        }
        .btn:disabled { background: #bdbdbd !important; border-color: #9e9e9e !important; color: #f5f5f5;
            cursor: not-allowed; transform: none; box-shadow: none; }

        .nav-tabs { display: flex; gap: 12px;
            margin-bottom: 25px; flex-wrap: wrap; }
        .tab-btn { 
            flex: 1;
            min-width: 100px; padding: 14px; 
            background-color: #fff; 
            border: 1.5px solid var(--border-color); 
            color: var(--text-dark); 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 12px;
            text-transform: uppercase; 
        }
        .tab-btn.active { 
            background-color: var(--steam-red);
            color: #ffffff; 
            border-color: var(--steam-red);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        #statusMessage { padding: 16px; border-radius: 12px; text-align: center; font-size: 14px; margin-bottom: 20px;
            display: none; font-weight: 600; }
        .status-success { background-color: #e8f5e9; color: var(--success-color);
            border: 1px solid #a5d6a7; }
        .status-error { background-color: #ffebee; color: var(--steam-red);
            border: 1px solid #ef9a9a; }
        .status-loading { background-color: #fff3e0; color: #e65100;
            border: 1px solid #ffcc80; }
        
        #areaGaji { display: none; }

        .table-laporan { width:100%; font-size:13px; text-align:left; border-collapse:collapse; background:#fff; border-radius:8px; overflow:hidden;
        }
        .table-laporan th { background-color: #f8fbfd; padding:10px; color:var(--steam-red); font-weight:700; text-transform:uppercase; font-size:11px;
            border-bottom:2px solid var(--border-color); }
        .table-laporan td { padding:10px; border-bottom:1px solid #eee; color:var(--text-dark);
            vertical-align: middle; }

        /* FAB DESIGN */
        .fab-wrapper {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: none; 
            flex-direction: column;
            gap: 12px;
            z-index: 9999;
        }
        .fab-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 2px solid #ffffff;
            color: white;
            font-size: 22px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
        }
        .fab-btn:hover { transform: scale(1.1); }
        .fab-sos { background: linear-gradient(135deg, #d32f2f 0%, #b71c1c 100%);
        }
        .fab-izin { background: linear-gradient(135deg, #ff8f00 0%, #ff6f00 100%); }

        .weekend-warning {
            background-color: #ffebee;
            border: 1.5px dashed var(--steam-red);
            color: var(--steam-red);
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            margin-top: 8px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="app-header">
            <h1>STEAM <span>MP 7000</span></h1>
            <p>JUJUR DISIPLIN DAN TANGGUNG JAWAB</p>
        </div>
        
        <div id="statusMessage"></div>

        <div class="fab-wrapper" id="boxFiturBersamaMengambang">
            <button type="button" class="fab-btn fab-sos" onclick="triggerSOS()" title="🚨 SOS EMERGENSI">🚨</button>
            <button type="button" class="fab-btn fab-izin" onclick="bukaHalamanIzin()" title="📝 AJUKAN IZIN / LIBUR">📅</button>
        </div>

        <div id="areaGaji"></div>

        <div id="panelFormIzinKaryawan" class="card" style="display:none; border-color:var(--steam-gold);">
            <h2>📝 FORM PENGAJUAN IZIN & LIBUR</h2>
            <form id="formAjuIzin" onsubmit="submitFormIzin(event)">
                <div class="form-group">
                    <label>Pilih Tanggal Izin</label>
                    <input type="date" id="izin_tanggal" onchange="validasiHariIzin()" required>
                    <div id="notifWeekend" class="weekend-warning">
                        ❌ TIDAK BOLEH IZIN DI HARI WEEKEND (JUMAT, SABTU, MINGGU)!
                    </div>
                </div>
                <div class="form-group">
                    <label>Jenis Pengajuan</label>
                    <select id="izin_jenis" required>
                        <option value="Sakit">Sakit (Butuh Istirahat)</option>
                        <option value="Ambil Jatah Istirahat">Ambil Jatah Istirahat / Keperluan Keluarga</option>
                        <option value="Izin Penting">Izin Penting Lainnya</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Alasan / Keterangan Detail</label>
                    <textarea id="izin_keterangan" rows="3" placeholder="Tulis alasan izin Anda secara lengkap..." required></textarea>
                </div>
                <button type="submit" id="btn_submit_izin" class="btn" style="background: linear-gradient(135deg, #ff8f00 0%, #e65100 100%);">KIRIM PERMOHONAN IZIN</button>
            </form>
            <button type="button" class="btn" style="margin-top:20px; background:#263238; border-color:var(--steam-gold);" onclick="kembaliKeHalamanUtamaDariIzin()">« KEMBALI KE HALAMAN UTAMA</button>
        </div>

        <div id="panelManajemenGajiOwner" class="card" style="display:none; border-color:var(--steam-red);">
            <h2>⚙️ MANAGEMENT & RESET GAJI TIM</h2>
            <div class="form-group">
                <label>PILIH ANGGOTA / ID KARYAWAN</label>
                <select id="pilih_karyawan_gaji_owner" onchange="tarikSlipGajiSpesifikOwner()">
                    <option value="">-- Silahkan Pilih Anggota --</option>
                </select>
            </div>
            
            <div id="boxHasilCariGajiKaryawan" style="margin-top:15px;"></div>

            <button type="button" class="btn" style="background:#263238; border-color:var(--steam-gold); margin-top:20px;" onclick="tutupPanelGajiOwner()">« KEMBALI KE KONTROL UTAMA</button>
        </div>

        <div id="gerbangAuth">
            <div id="boxLogin" class="card">
                <h2>VERIFIKASI AKSES ANGGOTA</h2>
                <form id="formLogin" onsubmit="handleAuth(event)">
                    <div class="form-group">
                        <label>USERNAME / ID LOGIN</label>
                        <input type="text" id="login_user" placeholder="Masukkan Username Anda" required>
                    </div>
                    <div class="form-group">
                        <label>KATA SANDI KEAMANAN</label>
                        <input type="password" id="login_sandi" placeholder="Masukkan Sandi" required>
                    </div>
                    <button type="submit" id="btn_login" class="btn">MASUK PANDU KONTROL</button>
                </form>
            </div>
        </div>

        <div id="halamanUtama" style="display: none;">
            
            <div id="boxFiturKT" style="display:none; margin-bottom:20px;">
                <button type="button" class="btn" style="background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%); border-color:#a5d6a7;" onclick="cekPendapatanKTPribadi()">💰 SINKRONISASI DATA PENDAPATAN SAYA</button>
            </div>

            <div id="boxFiturOwner" style="display:none; margin-bottom:20px;">
                <button type="button" class="btn" style="background: linear-gradient(135deg, var(--steam-gold) 0%, #b89020 100%); color:#fff; border-color: #fff;" onclick="bukaRekapOwner()">🔄 SEGAR KAN REKAP DATA UTAMA OWNER</button>
                <button type="button" class="btn" style="background: linear-gradient(135deg, #0288d1 0%, #01579b 100%); color:#fff; border-color: #fff;" onclick="bukaPanelManajemenGajiOwner()">📋 ⚙️ MANAJEMEN & RESET GAJI TIM</button>
            </div>

            <div class="nav-tabs" id="menuNavigasi">
                <button id="nav_pemasukan" class="tab-btn" onclick="switchTab('input-pemasukan')">Pemasukan</button>
                <button id="nav_pengeluaran" class="tab-btn" onclick="switchTab('input-pengeluaran')">Pengeluaran</button>
            </div>

            <div id="input-pemasukan" class="tab-content">
                <div class="card">
                    <h2>INPUT UNIT CUCIAN <span id="labelCabangKT" style="color:var(--steam-red); display:block; font-size:12px; margin-top:5px; font-weight: bold;"></span></h2>
                    <form id="formPemasukan" onsubmit="submitData(event, 'Pemasukan')">
                        <div class="form-group">
                            <label>Tanggal Operasional</label>
                            <input type="date" id="tgl_pemasukan" required>
                        </div>
                        <div class="form-group">
                            <label>Lokasi Cabang</label>
                            <select id="cabang_pemasukan" required>
                                <option value="Cabang Grobogan">Cabang Grobogan</option>
                                <option value="Cabang Palis">Cabang Palis</option>
                                <option value="Cabang Cayur">Cabang Cayur</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Anggota Lapangan (Mencuci)</label>
                            <select id="karyawan_pemasukan" required>
                                <option value="">-- Memuat Data Anggota --</option>
                            </select>
                        </div>
                        <div class="form-group" style="margin-bottom: 5px;">
                            <label>Jumlah Unit (Motor)</label>
                            <input type="number" id="unit_pemasukan" placeholder="Masukkan total motor" oninput="hitungKotorEstimasi()" required>
                        </div>

                        <div id="notifTargetBawahUnit" style="display: none; font-size: 13px; font-weight: bold; color: #aa7c11; background: #fffde7; border: 1.5px dashed #d4af37; padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: center;">
                            🌟 TARGET HARIAN CABANG TEMBUS, BOS! JOSS! 🚀
                        </div>

                        <div class="form-group">
                            <label>Estimasi Premi Anggota</label>
                            <input type="text" id="nominal_pemasukan_display" value="Rp 0" disabled style="font-weight:bold; color: var(--success-color); background: #f1f8e9; border-color:#c5e1a5;">
                        </div>
                        <div class="form-group">
                            <label>Uang Tips Pelanggan (Manual)</label>
                            <input type="number" id="tips_pemasukan" value="0" required>
                        </div>
                        <div class="form-group">
                            <label>Potongan Kasbon Anggota (Manual)</label>
                            <input type="number" id="kasbon_pemasukan" value="0" required>
                        </div>
                        <div class="form-group">
                            <label>Catatan Lapangan (Keterangan)</label>
                            <textarea id="ket_pemasukan" rows="2" placeholder="Keterangan ops harian..."></textarea>
                        </div>
                        <button type="submit" id="btn_submit_pemasukan" class="btn">KIRIM DATA KE SHEET1</button>
                    </form>
                </div>
            </div>

            <div id="input-pengeluaran" class="tab-content">
                <div class="card">
                    <h2>INPUT BIAYA OPERASIONAL TOKO</h2>
                    <form id="formPengeluaran" onsubmit="submitData(event, 'Pengeluaran')">
                        <div class="form-group">
                            <label>Tanggal Pengeluaran</label>
                            <input type="date" id="tgl_pengeluaran" required>
                        </div>
                        <div class="form-group">
                            <label>Lokasi Cabang</label>
                            <select id="cabang_pengeluaran" required>
                                <option value="Cabang Grobogan">Cabang Grobogan</option>
                                <option value="Cabang Palis">Cabang Palis</option>
                                <option value="Cabang Cayur">Cabang Cayur</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Kategori Alokasi Pembelian</label>
                            <select id="kategori_pengeluaran" required>
                                <option value="Beras Karyawan">Beras Karyawan</option>
                                <option value="Kopi Karyawan">Kopi Karyawan</option>
                                <option value="Listrik Token">Listrik Token</option>
                                <option value="Sabun">Sabun</option>
                                <option value="Maintenance">Maintenance</option>
                                <option value="Wifi">Wifi</option>
                                <option value="Lain-lain">Lain-lain</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Nominal Dana Keluar (Ditulis di kolom Kasbon Sheet1)</label>
                            <input type="number" id="nominal_pengeluaran" placeholder="Contoh: 50000" required>
                        </div>
                        <div class="form-group">
                            <label>Deskripsi Detail Pembelian</label>
                            <textarea id="ket_pengeluaran" rows="2" placeholder="Detail barang belanjaan..." required></textarea>
                        </div>
                        <button type="submit" id="btn_submit_pengeluaran" class="btn">KIRIM DATA PENGELUARAN</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyYz2PygcJzeJJ58b5zxs5mGhqW2sopDRI5iOM2_KowBt_qShvqBsnwzBFIPRrpSJru/exec";
        let SESSION_USER = null;
        let ARRAY_KARYAWAN = [];
        let NILAI_BERSIH_TERAKHIR_FILTERED = 0;

        window.onload = function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('tgl_pemasukan').value = today;
            document.getElementById('tgl_pengeluaran').value = today;
            document.getElementById('izin_tanggal').value = today;
        };

        function validasiHariIzin() {
            let inputTgl = document.getElementById('izin_tanggal').value;
            if(!inputTgl) return;
            let d = new Date(inputTgl);
            let dayNum = d.getDay(); 
            let boxWarn = document.getElementById('notifWeekend');
            let btnSub = document.getElementById('btn_submit_izin');
            if(dayNum === 5 || dayNum === 6 || dayNum === 0) {
                boxWarn.style.display = 'block';
                btnSub.disabled = true;
            } else {
                boxWarn.style.display = 'none';
                btnSub.disabled = false;
            }
        }

        function loadKaryawanDropdown() {
            fetch(WEB_APP_URL + "?action=getKaryawanList")
            .then(res => res.json())
            .then(res => {
                if(res.status === "success") {
                    ARRAY_KARYAWAN = res.data;
                    let dropdown = document.getElementById('karyawan_pemasukan');
                    dropdown.innerHTML = '<option value="">-- Pilih Anggota --</option>';
                    let dropdownOwner = document.getElementById('pilih_karyawan_gaji_owner');
                    dropdownOwner.innerHTML = '<option value="">-- Silahkan Pilih Anggota --</option>';
                    ARRAY_KARYAWAN.forEach(k => {
                        let opsiHtml = `<option value="${k.id}">${k.nama} (ID: ${k.id})</option>`;
                        dropdown.innerHTML += opsiHtml;
                        dropdownOwner.innerHTML += opsiHtml;
                    });
                }
            });
        }

        function handleAuth(event) {
            event.preventDefault();
            document.getElementById('btn_login').disabled = true;
            showStatus("Menghubungkan ke cloud server secure...", "loading");

            let user = document.getElementById('login_user').value;
            let sandi = document.getElementById('login_sandi').value;
            fetch(`${WEB_APP_URL}?action=loginUser&username=${encodeURIComponent(user)}&sandi=${encodeURIComponent(sandi)}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('btn_login').disabled = false;
                if(data.status === "success") {
                    SESSION_USER = data;
                    showStatus("Akses Diterima! " + data.nama, "success");
                    document.getElementById('gerbangAuth').style.display = 'none';
                    document.getElementById('boxFiturBersamaMengambang').style.display = 'flex';

                    if(data.jabatan === "Karyawan") {
                        document.getElementById('halamanUtama').style.display = 'none';
                        document.getElementById('areaGaji').style.display = 'block';
                        tampilkanRincianGajiKaryawan(data.gaji, data.nama);
                    } 
                    else if(data.jabatan === "Kepala Toko") {
                        document.getElementById('halamanUtama').style.display = 'block';
                        document.getElementById('boxFiturKT').style.display = 'block'; 
                        if(data.cabang) {
                            document.getElementById('cabang_pemasukan').value = data.cabang;
                            document.getElementById('cabang_pemasukan').disabled = true; 
                            document.getElementById('labelCabangKT').innerText = "📌 POS STORE LOCK: " + data.cabang.toUpperCase();
                        }
                        loadKaryawanDropdown();
                        switchTab('input-pemasukan');
                    } 
                    else if(data.jabatan === "Admin" || data.jabatan === "Owner") {
                        document.getElementById('halamanUtama').style.display = 'block';
                        document.getElementById('boxFiturOwner').style.display = 'block';
                        loadKaryawanDropdown();
                        switchTab('input-pemasukan');
                        bukaRekapOwner();
                    }
                } else { showStatus(data.message, "error"); }
            }).catch(() => {
                document.getElementById('btn_login').disabled = false;
                showStatus("Gagal otentikasi jaringan.", "error");
            });
        }

        function bukaPanelManajemenGajiOwner() {
            document.getElementById('halamanUtama').style.display = 'none';
            document.getElementById('areaGaji').style.display = 'none';
            document.getElementById('panelManajemenGajiOwner').style.display = 'block';
            document.getElementById('boxHasilCariGajiKaryawan').innerHTML = "<p style='text-align:center; color:#999; font-size:13px;'>Silahkan pilih salah satu karyawan di atas untuk memantau data slip.</p>";
            document.getElementById('pilih_karyawan_gaji_owner').value = "";
        }

        function tutupPanelGajiOwner() {
            document.getElementById('panelManajemenGajiOwner').style.display = 'none';
            document.getElementById('halamanUtama').style.display = 'block';
            document.getElementById('areaGaji').style.display = 'block';
            bukaRekapOwner();
        }

        function tarikSlipGajiSpesifikOwner() {
            let idKaryawanSelected = document.getElementById('pilih_karyawan_gaji_owner').value;
            if(!idKaryawanSelected) return;

            let objK = ARRAY_KARYAWAN.find(x => String(x.id) === String(idKaryawanSelected));
            let namaKaryawanSelected = objK ? objK.nama : "Karyawan";
            let displayBox = document.getElementById('boxHasilCariGajiKaryawan');
            displayBox.innerHTML = "<p style='text-align:center; color:orange; font-weight:bold; font-size:13px;'>Memanggil data transaksi berjalan dari Sheet1...</p>";
            
            fetch(`${WEB_APP_URL}?action=loginUser&username=${encodeURIComponent(idKaryawanSelected)}&sandi=BYPASS_OWNER`)
            .then(res => res.json())
            .then(data => {
                if(data.status === "error" && data.message.includes("Akses Ditolak")) {
                    displayBox.innerHTML = "<p style='color:red; font-size:12px; text-align:center;'>💡 Hubungkan sandi via database. Menampilkan hitungan estimasi kasbon...</p>";
                }
                
                let dataGaji = data.gaji || [];
                if(dataGaji.length === 0) {
                    displayBox.innerHTML = `<div style='text-align:center; padding:15px; color:#c62828; font-weight:bold;'>Sistem Bersih! Belum ada data unit cucian baru pasca tanggal reset terakhir milik ${namaKaryawanSelected}.</div>`;
                    return;
                }

                let totalUnit = 0, totalTips = 0, totalBonus = 0, totalKasbon = 0;
                let upahRate = dataGaji[0].upahUnitRate || 3000;
                let wifiRate = dataGaji[0].potonganWifi || 1000;
                let totalHariKerja = dataGaji.length;
                dataGaji.forEach(item => {
                    totalUnit += parseInt(item.unit) || 0; totalTips += parseInt(item.tips) || 0;
                    totalBonus += parseInt(item.bonus) || 0; totalKasbon += parseInt(item.kasbon) || 0;
                });
                let kotorUnit = totalUnit * upahRate; 
                let totalWifi = totalHariKerja * wifiRate;
                let terimaBersih = (kotorUnit + totalTips + totalBonus) - totalKasbon - totalWifi;
                NILAI_BERSIH_TERAKHIR_FILTERED = terimaBersih;

                displayBox.innerHTML = `
                    <div style="background:#f9f9f9; padding:15px; border-radius:10px; border:1px solid #ccc; margin-top:10px;">
                        <table style="width:100%; font-size:13px; color:#333; line-height:20px;">
                            <tr><td><b>Nama Anggota:</b></td><td style="text-align:right;">${namaKaryawanSelected}</td></tr>
                            <tr><td>Total Cucian Masuk:</td><td style="text-align:right;">${totalUnit} Motor</td></tr>
                            <tr><td>Upah Pokok (x${upahRate}):</td><td style="text-align:right;">Rp ${kotorUnit.toLocaleString('id-ID')}</td></tr>
                            <tr><td>Total Tips Lapangan:</td><td style="text-align:right; color:green;">+ Rp ${totalTips.toLocaleString('id-ID')}</td></tr>
                            <tr><td>Bonus Target Tembus:</td><td style="text-align:right; color:orange;">+ Rp ${totalBonus.toLocaleString('id-ID')}</td></tr>
                            <tr><td>Potongan Kasbon:</td><td style="text-align:right; color:red;">- Rp ${totalKasbon.toLocaleString('id-ID')}</td></tr>
                            <tr><td>Iuran Wifi Harian:</td><td style="text-align:right; color:red;">- Rp ${totalWifi.toLocaleString('id-ID')}</td></tr>
                            <tr style="font-weight:bold; font-size:14px; background:#fff; border-top:1px solid #333;">
                                <td style="padding:5px 0;">SIAP CAIRKAN:</td>
                                <td style="text-align:right; color:var(--success-color); padding:5px 0;">Rp ${terimaBersih.toLocaleString('id-ID')}</td>
                            </tr>
                        </table>
                        <button type="button" class="btn" style="background:linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%); margin-top:15px; font-size:13px;" onclick="eksekusiTombolResetGajiKaryawanCloud('${idKaryawanSelected}', '${namaKaryawanSelected}')">🔒 RESET & CAIRKAN GAJI SEKARANG</button>
                    </div>`;
            }).catch(() => {
                displayBox.innerHTML = "<p style='color:red; text-align:center; font-size:12px;'>Gagal memvalidasi kredensial keamanan enkripsi ID.</p>";
            });
        }

        function eksekusiTombolResetGajiKaryawanCloud(idKaryawan, namaKaryawan) {
            if(!confirm(`Apakah Anda yakin ingin mencairkan upah sebesar Rp ${NILAI_BERSIH_TERAKHIR_FILTERED.toLocaleString('id-ID')} sekaligus me-RESET tanggal hitungan periode berjalan untuk ${namaKaryawan}?`)) return;

            showStatus("Memproses pembaruan tanggal reset di GajiKaryawan...", "loading");
            
            let urlParams = new URLSearchParams();
            urlParams.append("action", "eksekusiResetGaji");
            urlParams.append("idKaryawan", idKaryawan);
            urlParams.append("namaKaryawan", namaKaryawan);
            urlParams.append("nominalBersih", NILAI_BERSIH_TERAKHIR_FILTERED);
            fetch(WEB_APP_URL, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: urlParams.toString()
            })
            .then(res => res.text())
            .then(txt => {
                if(txt === "SUCCESS_RESET") {
                    showStatus(`Sukses! Gaji ${namaKaryawan} Berhasil di-Reset.`, "success");
                    bukaPanelManajemenGajiOwner();
                } else {
                    showStatus("Gagal mereset data cloud.", "error");
                }
            }).catch(() => {
                showStatus("Masalah gangguan jaringan internet.", "error");
            });
        }

        function bukaHalamanIzin() {
            if(!SESSION_USER) return alert("Silahkan login terlebih dahulu!");
            document.getElementById('areaGaji').style.display = 'none';
            document.getElementById('halamanUtama').style.display = 'none';
            document.getElementById('panelFormIzinKaryawan').style.display = 'block';
            validasiHariIzin();
        }

        function kembaliKeHalamanUtamaDariIzin() {
            document.getElementById('panelFormIzinKaryawan').style.display = 'none';
            if(SESSION_USER.jabatan === "Karyawan") {
                document.getElementById('areaGaji').style.display = 'block';
            } else {
                document.getElementById('areaGaji').style.display = 'block';
                document.getElementById('halamanUtama').style.display = 'block';
            }
        }

        function submitFormIzin(event) {
            event.preventDefault();
            document.getElementById('btn_submit_izin').disabled = true;
            showStatus("Mengirim dokumen pengajuan...", "loading");
            
            let d = new Date(document.getElementById('izin_tanggal').value);
            let formatTgl = `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth()+1).padStart(2, '0')}/${d.getFullYear()}`;
            let urlParams = new URLSearchParams();
            urlParams.append("action", "insertIzinRow");
            urlParams.append("idKaryawan", SESSION_USER.username);
            urlParams.append("nama", SESSION_USER.nama);
            urlParams.append("jenis", document.getElementById('izin_jenis').value);
            urlParams.append("keterangan", `[Izin Tgl ${formatTgl}] - ${document.getElementById('izin_keterangan').value}`);
            
            fetch(WEB_APP_URL, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: urlParams.toString()
            })
            .then(res => res.text())
            .then(text => {
                document.getElementById('btn_submit_izin').disabled = false;
                if(text === "SUCCESS_IZIN") {
                    showStatus("Permohonan izin tersimpan di data Pengaduan!", "success");
                    document.getElementById('formAjuIzin').reset();
                    document.getElementById('izin_tanggal').value = new Date().toISOString().split('T')[0];
                } else {
                    showStatus("Ditolak sistem cloud.", "error");
                }
            }).catch(() => {
                document.getElementById('btn_submit_izin').disabled = false;
                showStatus("Kendala koneksi.", "error");
            });
        }

        function bukaRekapOwner() {
            showStatus("Menyinkronkan data Sheet1...", "loading");
            fetch(WEB_APP_URL + "?action=getLaporanOwner")
            .then(res => res.json())
            .then(res => {
                showStatus("Data sinkron.", "success");
                let targetBox = document.getElementById('areaGaji');
                targetBox.style.display = "block";
                
                let totalUnitAll = 0;
                let listGajiHtml = "";
                for (let namaK in res.rekapKaryawan) {
                    let unitKaryawan = res.rekapKaryawan[namaK].totalUnit || 0;
                    let gajiBerjalan = res.rekapKaryawan[namaK].gaji || 0;
                    totalUnitAll += unitKaryawan;
                    listGajiHtml += `<tr style="border-bottom:1px solid #eee;"> <td style="padding:10px;">${namaK} <span style="font-size:11px; color:#78909c;">(${unitKaryawan} Unit)</span></td> <td style="padding:10px; font-weight:bold; text-align:right; color:var(--steam-red);">Rp ${gajiBerjalan.toLocaleString('id-ID')}</td> </tr>`;
                }
                
                if(listGajiHtml === "") listGajiHtml = "<tr><td colspan='2' style='text-align:center; padding:10px; color:#999;'>Belum ada data unit</td></tr>";
                
                let porsiRate = res.porsiOwnerRate || 4000;
                let kotorOwner = totalUnitAll * porsiRate;
                let bersihOwner = kotorOwner - (res.pengeluaran || 0);
                
                targetBox.innerHTML = `
                    <div class="card" style="padding: 20px;">
                        <h3 style="color:var(--steam-red); font-size:13px; border-left:4px solid var(--steam-gold); padding-left:10px; margin-bottom:15px; text-transform:uppercase;">📊 NERACA KAS OWNER KONSOLIDASI (Porsi Rp${porsiRate.toLocaleString('id-ID')})</h3>
                        <table style="width:100%; font-size:14px; text-align:left; border-collapse:collapse; margin-bottom:20px;">
                            <tr style="border-bottom:1px solid #eee;"><td style="padding:10px; color:#555;">Total Cucian Masuk</td><td style="padding:10px; font-weight:bold; text-align:right;">${totalUnitAll} Unit</td></tr>
                            <tr style="border-bottom:1px solid #eee;"><td style="padding:10px; color:#555;">Omset Kas Owner</td><td style="padding:10px; font-weight:bold; color:#2e7d32; text-align:right;">Rp ${kotorOwner.toLocaleString('id-ID')}</td></tr>
                            <tr style="border-bottom:1px solid #eee;"><td style="padding:10px; color:#555;">Total Biaya Toko</td><td style="padding:10px; font-weight:bold; color:var(--steam-red); text-align:right;">- Rp ${(res.pengeluaran || 0).toLocaleString('id-ID')}</td></tr>
                            <tr style="background:#fff5f5; font-weight:bold;"><td style="padding:12px; color:var(--text-dark);">PROFIT NETTO OWNER</td><td style="padding:12px; text-align:right; color:var(--success-color); font-size:16px;">Rp ${bersihOwner.toLocaleString('id-ID')}</td></tr>
                        </table>
                        <h3 style="color:var(--text-dark); font-size:13px; border-left:4px solid var(--steam-red); padding-left:10px; margin-bottom:10px; text-transform:uppercase;">👥 ESTIMASI REKAP UPAH TIM LAPANGAN</h3>
                        <table class="table-laporan">${listGajiHtml}</table>
                    </div>`;
            }).catch(() => {
                showStatus("Gagal memuat rekap.", "error");
            });
        }

        function cekPendapatanKTPribadi() {
            showStatus("Mengambil data riwayat harian...", "loading");
            fetch(`${WEB_APP_URL}?action=loginUser&username=${encodeURIComponent(SESSION_USER.username)}&sandi=${encodeURIComponent(document.getElementById('login_sandi').value)}`)
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    showStatus("Data harian sinkron.", "success");
                    tampilkanRincianGajiKaryawan(data.gaji, data.nama);
                }
            });
        }

        function tampilkanRincianGajiKaryawan(dataGaji, nama) {
            let targetBox = document.getElementById('areaGaji');
            targetBox.style.display = 'block';
            if(!dataGaji || dataGaji.length === 0) {
                targetBox.innerHTML = `<div class="card" style="text-align:center; padding:30px;"><p style="color:var(--steam-red); font-weight:bold; font-size:16px;">Halo ${nama},</p><p style="font-size:13px; margin-top:5px; color:#666;">Belum ada riwayat pengerjaan unit harian baru di periode berjalan ini.</p></div>`;
                return;
            }
            
            let totalUnit = 0, totalTips = 0, totalBonus = 0, totalKasbon = 0;
            let totalHariKerja = dataGaji.length;
            let barisTabelHtml = "";
            let upahRate = dataGaji[0].upahUnitRate || 3000;
            let wifiRate = dataGaji[0].potonganWifi || 1000;
            
            dataGaji.forEach(item => {
                let u = parseInt(item.unit) || 0;
                let t = parseInt(item.tips) || 0;
                let b = parseInt(item.bonus) || 0;
                let k = parseInt(item.kasbon) || 0;
                totalUnit += u;
                totalTips += t;
                totalBonus += b;
                totalKasbon += k;
                
                let upahCuci = u * upahRate;
                let bersihHarian = (upahCuci + t + b) - k - wifiRate;
                
                barisTabelHtml += ` <tr style="border-bottom: 1px solid #e0e0e0; font-size: 13px; text-align:center;"> <td style="padding:10px 4px; text-align:left; font-weight:600;">${item.tglTampilan}</td> <td>${u}</td> <td style="color:#2e7d32;">${t.toLocaleString('id-ID')}</td> <td style="color:#aa7c11; font-weight:600;">${b.toLocaleString('id-ID')}</td> <td style="color:var(--steam-red);">- ${k.toLocaleString('id-ID')}</td> <td style="text-align: right; font-weight: bold; color: #1b5e20;">Rp ${bersihHarian.toLocaleString('id-ID')}</td> </tr>`;
            });
            
            let kotorUnit = totalUnit * upahRate;
            let totalWifi = totalHariKerja * wifiRate;
            let terimaBersih = (kotorUnit + totalTips + totalBonus) - totalKasbon - totalWifi;
            
            targetBox.innerHTML = ` <div class="card" style="margin-bottom:20px;"> <h2>SLIP GAJI ANGGOTA</h2> <table style="width:100%;" class="table-laporan"> <thead> <tr><th>TGL</th><th>UNIT</th><th>TIPS</th><th>BONUS</th><th>KASBON</th><th style="text-align:right;">BERSIH</th></tr> </thead> <tbody>${barisTabelHtml}</tbody> </table> <div style="margin-top:15px; border-top:2px solid var(--steam-gold); padding-top:15px;"> <p style="font-weight:bold; font-size:15px; text-align:right;">TOTAL BERSIH: <span style="color:var(--success-color);">Rp ${terimaBersih.toLocaleString('id-ID')}</span></p> </div> </div>`;
        }

        // --- FUNGSI TAMBAHAN ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('nav_' + tabId.split('-')[1]).classList.add('active');
        }

        function showStatus(msg, type) {
            let s = document.getElementById('statusMessage');
            s.innerText = msg;
            s.className = (type === 'success') ? 'status-success' : (type === 'error') ? 'status-error' : 'status-loading';
            s.style.display = 'block';
            setTimeout(() => { s.style.display = 'none'; }, 3000);
        }

        function hitungKotorEstimasi() {
            let u = document.getElementById('unit_pemasukan').value;
            let rate = 3000;
            document.getElementById('nominal_pemasukan_display').value = "Rp " + (u * rate).toLocaleString('id-ID');
            if(u >= 10) document.getElementById('notifTargetBawahUnit').style.display = 'block';
            else document.getElementById('notifTargetBawahUnit').style.display = 'none';
        }

        function triggerSOS() { alert("Fitur SOS diaktifkan!"); }
        
        function submitData(event, tipe) {
            event.preventDefault();
            // Implementasi fungsi submitData sesuai backend Anda
        }
    </script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Manajemen Cabang & Rekap Harian</title>
  <!-- Menggunakan Tailwind CSS CDN untuk desain modern & responsif -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- Menggunakan Font Awesome untuk ikon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans min-h-screen flex flex-col justify-between">

  <!-- URL Web App Apps Script -->
  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxWBYtbeBe3-xH3R80axowIeVbI8n6fc-x3qwTbZammMY3dpsAOYR2y9DcD6R5AURaI/exec";
    let CURRENT_CABANG = "";
    let LOGIN_DATA = {};
  </script>

  <!-- ================= LOADING SCREEN ================= -->
  <div id="loadingScreen" class="fixed inset-0 bg-gray-900/50 backdrop-blur-sm flex flex-col justify-center items-center z-50">
    <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-600"></div>
    <p class="text-white mt-4 font-semibold text-lg" id="loadingText">Memuat sistem, mohon tunggu...</p>
  </div>

  <!-- ================= NOTIFIKASI TOAST ================= -->
  <div id="toast" class="fixed top-5 right-5 max-w-sm w-full bg-white rounded-lg shadow-lg border-l-4 p-4 hidden z-50 transition-all duration-300 transform translate-y-[-20px]">
    <div class="flex items-center">
      <div id="toastIcon" class="text-xl mr-3"></div>
      <div id="toastMessage" class="text-gray-700 font-medium text-sm"></div>
    </div>
  </div>

  <!-- ================= 1. HALAMAN LOGIN ================= -->
  <div id="pageLogin" class="flex-grow flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
      <div class="text-center mb-8">
        <div class="bg-blue-100 text-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 text-2xl shadow-inner">
          <i class="fa-solid fa-store"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-800">Login Cabang</h2>
        <p class="text-gray-500 text-sm mt-1">Silakan pilih cabang dan masukkan PIN Anda</p>
      </div>

      <form id="formLogin" onsubmit="handleLogin(event)">
        <div class="mb-5">
          <label class="block text-gray-700 text-sm font-semibold mb-2"><i class="fa-solid fa-map-location-dot mr-2 text-blue-500"></i>Pilih Cabang</label>
          <select id="loginCabang" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-gray-50 font-medium text-gray-700" required>
            <option value="" disabled selected>-- Pilih Cabang --</option>
          </select>
        </div>

        <div class="mb-6">
          <label class="block text-gray-700 text-sm font-semibold mb-2"><i class="fa-solid fa-key mr-2 text-blue-500"></i>PIN Akses</label>
          <input type="password" id="loginPin" inputmode="numeric" pattern="[0-9]*" placeholder="Masukkan PIN" class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition bg-gray-50 tracking-widest text-center text-lg font-bold" required>
        </div>

        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition duration-200 transform active:scale-95 shadow-md flex justify-center items-center gap-2">
          <i class="fa-solid fa-right-to-bracket"></i> Masuk Aplikasi
        </button>
      </form>
    </div>
  </div>

  <!-- ================= 2. HALAMAN UTAMA (DASHBOARD) ================= -->
  <div id="pageDashboard" class="hidden flex-grow flex flex-col">
    <!-- Navbar -->
    <nav class="bg-white shadow-sm border-b border-gray-200 px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <div class="bg-blue-600 text-white p-2 rounded-lg text-lg"><i class="fa-solid fa-chart-line"></i></div>
        <div>
          <h1 class="font-bold text-gray-800 leading-tight">Dashboard Rekap</h1>
          <p id="displayCabang" class="text-xs text-blue-600 font-semibold uppercase tracking-wider"></p>
        </div>
      </div>
      <button onclick="handleLogout()" class="text-gray-500 hover:text-red-600 p-2 rounded-lg hover:bg-red-50 transition" title="Keluar">
        <i class="fa-solid fa-power-off text-lg"></i>
      </button>
    </nav>

    <!-- Konten Menu Utama -->
    <div class="p-4 max-w-4xl w-full mx-auto flex-grow">
      <!-- Pilihan Menu Navigasi Internal -->
      <div class="grid grid-cols-2 gap-3 mb-6 bg-white p-2 rounded-xl shadow-sm border border-gray-200">
        <button id="btnTabRekap" onclick="switchTab('rekap')" class="py-3 px-4 rounded-lg font-bold text-sm transition-all duration-200 flex justify-center items-center gap-2 bg-blue-600 text-white shadow-sm">
          <i class="fa-solid fa-file-invoice-dollar"></i> Rekap Harian
        </button>
        <button id="btnTabKaryawan" onclick="switchTab('karyawan')" class="py-3 px-4 rounded-lg font-bold text-sm transition-all duration-200 flex justify-center items-center gap-2 text-gray-600 hover:bg-gray-100">
          <i class="fa-solid fa-user-plus"></i> Karyawan Baru
        </button>
      </div>

      <!-- FORM A: INPUT REKAP KARYAWAN -->
      <div id="tabRekap" class="bg-white p-6 rounded-2xl shadow-md border border-gray-100 transition-all">
        <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2 border-b pb-3 border-gray-100">
          <i class="fa-solid fa-file-pen text-blue-600"></i> Input Rekap Kerja Harian
        </h3>
        
        <form id="formRekap" onsubmit="submitRekap(event)">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            <div>
              <label class="block text-gray-700 text-xs font-bold uppercase tracking-wider mb-2">Tanggal Rekap</label>
              <input type="date" id="rekapTanggal" class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required>
            </div>
            <div>
              <label class="block text-gray-700 text-xs font-bold uppercase tracking-wider mb-2">Pilih Personel</label>
              <select id="rekapKaryawan" onchange="hitungBersih()" class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50 font-medium text-gray-700" required>
                <option value="" disabled selected>-- Pilih Karyawan --</option>
              </select>
            </div>
          </div>

          <div class="grid grid-cols-2 sm:grid-cols-3 gap-4 mb-4">
            <div>
              <label class="block text-gray-700 text-xs font-bold uppercase tracking-wider mb-2">Jumlah Unit</label>
              <input type="number" id="rekapUnit" oninput="hitungBersih()" min="0" placeholder="0" class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required>
            </div>
            <div>
              <label class="block text-gray-700 text-xs font-bold uppercase tracking-wider mb-2">Tips Mandiri</label>
              <input type="number" id="rekapTips" oninput="hitungBersih()" min="0" placeholder="0" class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
              <label class="block text-gray-700 text-xs font-bold uppercase tracking-wider mb-2">Bonus Tambahan</label>
              <input type="number" id="rekapBonus" oninput="hitungBersih()" min="0" placeholder="0" class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
              <label class="block text-gray-700 text-xs font-bold uppercase tracking-wider mb-2">Kasbon</label>
              <input type="number" id="rekapKasbon" oninput="hitungBersih()" min="0" placeholder="0" class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
              <label class="block text-gray-700 text-xs font-bold uppercase tracking-wider mb-2">Potongan Wifi</label>
              <input type="number" id="rekapWifi" oninput="hitungBersih()" min="0" value="1000" placeholder="1000" class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
          </div>

          <!-- INPUT CHECKBOX TARGET OTOMATIS -->
          <div class="mb-4 bg-blue-50 border border-blue-200 p-3 rounded-xl flex items-center">
            <input type="checkbox" id="chkTarget" onchange="hitungBersih()" class="w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500 cursor-pointer">
            <label for="chkTarget" class="ml-3 text-sm font-semibold text-blue-900 cursor-pointer select-none">
              <i class="fa-solid fa-bullseye mr-1 text-blue-600"></i> Tembus Target Harian Cabang
            </label>
          </div>

          <!-- KOTAK ESTIMASI TOTAL BERSIH -->
          <div class="bg-emerald-50 border border-emerald-200 rounded-2xl p-4 mb-6 flex justify-between items-center shadow-inner">
            <div>
              <span class="text-xs font-bold text-emerald-800 uppercase tracking-wider block">Estimasi Nominal Bersih</span>
              <span class="text-gray-500 text-xs">Otomatis Terkalkulasi</span>
            </div>
            <div class="text-emerald-700 font-extrabold text-2xl tracking-wide" id="txtNominalBersih">
              Rp 0
            </div>
          </div>

          <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-xl transition duration-200 shadow-md flex justify-center items-center gap-2">
            <i class="fa-solid fa-cloud-arrow-up"></i> Simpan Rekap Kerja
          </button>
        </form>
      </div>

      <!-- FORM B: TAMBAH KARYAWAN BARU -->
      <div id="tabKaryawan" class="bg-white p-6 rounded-2xl shadow-md border border-gray-100 hidden transition-all">
        <h3 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2 border-b pb-3 border-gray-100">
          <i class="fa-solid fa-user-plus text-blue-600"></i> Daftarkan Karyawan/Personel Baru
        </h3>

        <form id="formKaryawan" onsubmit="submitKaryawan(event)">
          <div class="mb-4">
            <label class="block text-gray-700 text-xs font-bold uppercase tracking-wider mb-2">Nama Lengkap Personel</label>
            <input type="text" id="masterNama" placeholder="Contoh: Muhammad Nur Barlian" class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none" required>
          </div>

          <div class="mb-6">
            <label class="block text-gray-700 text-xs font-bold uppercase tracking-wider mb-2">Jabatan / Posisi</label>
            <select id="masterJabatan" class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50 text-gray-700 font-medium">
              <option value="">Karyawan Biasa</option>
              <option value="Kepala Toko">Kepala Toko</option>
              <option value="Wakil Kepala Toko">Wakil Kepala Toko</option>
            </select>
          </div>

          <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition duration-200 shadow-md flex justify-center items-center gap-2">
            <i class="fa-solid fa-user-check"></i> Daftarkan ke Master Data
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-white border-t border-gray-200 text-center py-3 text-xs text-gray-400 font-medium">
    &copy; 2026 Steam MP 7000. All Rights Reserved.
  </footer>

  <!-- ================= LOGIKA JAVASCRIPT JALUR LOGIS ================= -->
  <script>
    // Set Tanggal Input Harian default ke hari ini saat halaman dimuat
    document.getElementById('rekapTanggal').valueAsDate = new Date();

    // Jalankan pengambilan data konfigurasi awal saat dokumen siap
    window.addEventListener('DOMContentLoaded', () => {
      initApp();
    });

    // 1. TAMPILKAN TOAST NOTIFIKASI
    function showToast(message, type = "success") {
      const toast = document.getElementById('toast');
      const icon = document.getElementById('toastIcon');
      const msg = document.getElementById('toastMessage');

      msg.innerText = message;
      toast.classList.remove('hidden', 'border-emerald-500', 'border-red-500');

      if (type === "success") {
        toast.classList.add('border-emerald-500');
        icon.innerHTML = '<i class="fa-solid fa-circle-check text-emerald-500"></i>';
      } else {
        toast.classList.add('border-red-500');
        icon.innerHTML = '<i class="fa-solid fa-circle-xmark text-red-500"></i>';
      }

      toast.style.transform = "translateY(0)";
      setTimeout(() => {
        toast.style.transform = "translateY(-20px)";
        toast.classList.add('hidden');
      }, 4000);
    }

    // 2. INITIALISASI DATA AWAL (GET LOGIN DATA)
    function initApp() {
      toggleLoading(true, "Menghubungkan ke database pusat...");
      
      fetch(`${WEB_APP_URL}?action=getLoginData`)
        .then(response => response.json())
        .then(data => {
          LOGIN_DATA = data;
          const selectCabang = document.getElementById('loginCabang');
          selectCabang.innerHTML = '<option value="" disabled selected>-- Pilih Cabang --</option>';
          
          Object.keys(data).forEach(cabang => {
            let opt = document.createElement('option');
            opt.value = cabang;
            opt.innerText = cabang;
            selectCabang.appendChild(opt);
          });
          
          toggleLoading(false);
        })
        .catch(err => {
          console.error(err);
          toggleLoading(false);
          showToast("Gagal memuat konfigurasi cabang. Periksa koneksi internet!", "error");
        });
    }

    // 3. AMBIL DATA KARYAWAN UNTUK DROPDOWN
    function loadKaryawanDropdown() {
      const selectKaryawan = document.getElementById('rekapKaryawan');
      selectKaryawan.innerHTML = '<option value="" disabled selected>Memuat nama personel...</option>';

      fetch(`${WEB_APP_URL}?action=getKaryawan`)
        .then(response => response.json())
        .then(list => {
          selectKaryawan.innerHTML = '<option value="" disabled selected>-- Pilih Karyawan --</option>';
          list.forEach(karyawan => {
            let opt = document.createElement('option');
            opt.value = karyawan;
            opt.innerText = karyawan;
            selectKaryawan.appendChild(opt);
          });
        })
        .catch(err => {
          console.error(err);
          showToast("Gagal memuat daftar master karyawan.", "error");
        });
    }

    // 4. KONTROL LOADING LAYAR
    function toggleLoading(show, text = "") {
      const loader = document.getElementById('loadingScreen');
      if (text) document.getElementById('loadingText').innerText = text;
      
      if (show) {
        loader.classList.remove('hidden');
      } else {
        loader.classList.add('hidden');
      }
    }

    // 5. PROSES HANDLER LOGIN
    function handleLogin(event) {
      event.preventDefault();
      const cabang = document.getElementById('loginCabang').value;
      const pinInput = document.getElementById('loginPin').value;

      if (!cabang || !pinInput) {
        showToast("Pilih Cabang dan masukkan PIN dengan lengkap!", "error");
        return;
      }

      if (LOGIN_DATA[cabang] && LOGIN_DATA[cabang] === pinInput) {
        CURRENT_CABANG = cabang;
        document.getElementById('displayCabang').innerText = `Cabang: ${cabang}`;
        
        document.getElementById('pageLogin').classList.add('hidden');
        document.getElementById('pageDashboard').classList.remove('hidden');
        
        showToast(`Selamat datang di panel sistem ${cabang}!`, "success");
        loadKaryawanDropdown();
      } else {
        showToast("PIN Akses yang Anda masukkan salah!", "error");
      }
    }

    // 6. PROSES HANDLER LOGOUT
    function handleLogout() {
      CURRENT_CABANG = "";
      document.getElementById('loginPin').value = "";
      document.getElementById('pageDashboard').classList.add('hidden');
      document.getElementById('pageLogin').classList.remove('hidden');
      showToast("Berhasil keluar dari sistem.", "success");
    }

    // 7. NAVIGASI TAB MENU INTERNAL
    function switchTab(tab) {
      const tabRekap = document.getElementById('tabRekap');
      const tabKaryawan = document.getElementById('tabKaryawan');
      const btnRekap = document.getElementById('btnTabRekap');
      const btnKaryawan = document.getElementById('btnTabKaryawan');

      if (tab === 'rekap') {
        tabRekap.classList.remove('hidden');
        tabKaryawan.classList.add('hidden');
        btnRekap.className = "py-3 px-4 rounded-lg font-bold text-sm transition-all duration-200 flex justify-center items-center gap-2 bg-blue-600 text-white shadow-sm";
        btnKaryawan.className = "py-3 px-4 rounded-lg font-bold text-sm transition-all duration-200 flex justify-center items-center gap-2 text-gray-600 hover:bg-gray-100";
      } else {
        tabRekap.classList.add('hidden');
        tabKaryawan.classList.remove('hidden');
        btnRekap.className = "py-3 px-4 rounded-lg font-bold text-sm transition-all duration-200 flex justify-center items-center gap-2 text-gray-600 hover:bg-gray-100";
        btnKaryawan.className = "py-3 px-4 rounded-lg font-bold text-sm transition-all duration-200 flex justify-center items-center gap-2 bg-blue-600 text-white shadow-sm";
      }
    }

    // 8. HITUNG ESTIMASI NOMINAL BERSIH DI LAYAR SECARA OTOMATIS
    function hitungBersih() {
      const unit = parseInt(document.getElementById('rekapUnit').value) || 0;
      const tips = parseInt(document.getElementById('rekapTips').value) || 0;
      const bonusManual = parseInt(document.getElementById('rekapBonus').value) || 0;
      const kasbon = parseInt(document.getElementById('rekapKasbon').value) || 0;
      const wifi = parseInt(document.getElementById('rekapWifi').value) || 0;

      // 1. Hitung Komisi Dasar (Rp 3.000 per unit)
      const komisiUnit = unit * 3000; 

      // 2. Logika Hitung Bonus Target Otomatis berdasarkan Jabatan
      let bonusTarget = 0;
      const IsTembusTarget = document.getElementById('chkTarget').checked;
      const karyawanSelected = document.getElementById('rekapKaryawan').value; // Mengandung "Nama (Jabatan)"

      if (IsTembusTarget && karyawanSelected) {
        if (karyawanSelected.includes("Kepala Toko")) {
          bonusTarget = 10000; // Bonus KT jika tembus target
        } else {
          bonusTarget = 5000;  // Bonus Karyawan biasa jika tembus target
        }
      }

      // Total Semua Bonus (Manual + Otomatis Target)
      const totalBonus = bonusManual + bonusTarget;

      // Rumus Bersih: (Komisi Unit + Tips + Total Bonus) - Kasbon - Potongan Wifi
      const bersih = (komisiUnit + tips + totalBonus) - kasbon - wifi;

      document.getElementById('txtNominalBersih').innerText = new Intl.NumberFormat('id-ID', {
        style: 'currency',
        currency: 'IDR',
        maximumFractionDigits: 0
      }).format(bersih);

      return bersih;
    }

    // 9. SUBMIT FORM REKAP HARIAN KE GOOGLE SHEETS
    function submitRekap(event) {
      event.preventDefault();
      toggleLoading(true, "Sedang mengirim dan mengunci data rekap...");

      const tglRaw = document.getElementById('rekapTanggal').value; 
      const dateParts = tglRaw.split('-');
      const tanggalFormatted = `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;

      const karyawan = document.getElementById('rekapKaryawan').value;
      const unit = document.getElementById('rekapUnit').value;
      const tips = document.getElementById('rekapTips').value || 0;
      const kasbon = document.getElementById('rekapKasbon').value || 0;
      const wifi = document.getElementById('rekapWifi').value || 0;
      const nominalBersih = hitungBersih();

      // Menghitung total bonus gabungan untuk dikirim ke Sheet
      let bonusManual = parseInt(document.getElementById('rekapBonus').value) || 0;
      let bonusTarget = 0;
      if (document.getElementById('chkTarget').checked && karyawan) {
        if (karyawan.includes("Kepala Toko")) {
          bonusTarget = 10000;
        } else {
          bonusTarget = 5000;
        }
      }
      const totalBonusDikirim = bonusManual + bonusTarget;

      const formData = new URLSearchParams();
      formData.append("action", "insertRow");
      formData.append("tipe", "Rekap Karyawan");
      formData.append("tanggal", tanggalFormatted);
      formData.append("cabang", CURRENT_CABANG);
      formData.append("karyawan", karyawan);
      formData.append("unit", unit);
      formData.append("tips", tips);
      formData.append("bonus", totalBonusDikirim);
      formData.append("kasbon", kasbon);
      formData.append("potongan_wifi", wifi);
      formData.append("nominal_bersih", nominalBersih);

      fetch(WEB_APP_URL, {
        method: "POST",
        body: formData,
        headers: {
          "Content-Type": "application/x-www-form-urlencoded"
        }
      })
      .then(res => res.json())
      .then(response => {
        toggleLoading(false);
        if (response.status === "Success") {
          showToast("Data rekap harian berhasil dikunci ke Google Sheet!", "success");
          // Reset Form input saja
          document.getElementById('rekapUnit').value = "";
          document.getElementById('rekapTips').value = "";
          document.getElementById('rekapBonus').value = "";
          document.getElementById('rekapKasbon').value = "";
          document.getElementById('chkTarget').checked = false;
          hitungBersih();
        } else {
          showToast(`Gagal menyimpan: ${response.message}`, "error");
        }
      })
      .catch(err => {
        console.error(err);
        toggleLoading(false);
        showToast("Terjadi gangguan jaringan saat mengirim data.", "error");
      });
    }

    // 10. SUBMIT PERSONEL BARU KE MASTER DATA
    function submitKaryawan(event) {
      event.preventDefault();
      toggleLoading(true, "Mendaftarkan personel baru...");

      const nama = document.getElementById('masterNama').value;
      const jabatan = document.getElementById('masterJabatan').value;

      const formData = new URLSearchParams();
      formData.append("action", "insertRow");
      formData.append("tipe", "Tambah Karyawan Baru");
      formData.append("nama_karyawan", nama);
      formData.append("jabatan", jabatan);

      fetch(WEB_APP_URL, {
        method: "POST",
        body: formData,
        headers: {
          "Content-Type": "application/x-www-form-urlencoded"
        }
      })
      .then(res => res.json())
      .then(response => {
        toggleLoading(false);
        if (response.status === "Success") {
          showToast(`Berhasil mendaftarkan ${nama} ke sistem!`, "success");
          document.getElementById('masterNama').value = "";
          document.getElementById('masterJabatan').value = "";
          
          loadKaryawanDropdown();
          switchTab('rekap');
        } else {
          showToast(`Gagal mendaftarkan: ${response.message}`, "error");
        }
      })
      .catch(err => {
        console.error(err);
        toggleLoading(false);
        showToast("Terjadi gangguan jaringan saat mendaftarkan karyawan.", "error");
      });
    }
  </script>
</body>
</html>

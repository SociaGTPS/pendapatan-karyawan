<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STEAM MP 7000 - CONTROL PANEL</title>
    <style>
        :root {
            /* Palette Merah Putih Elegan & Profesional (Nyaman di Mata) */
            --bg-color: #f4f7f6; 
            --white-card: #ffffff;
            --steam-red: #c62828; 
            --steam-red-hover: #b71c1c;
            --steam-gold: #d4af37; 
            --text-dark: #263238; 
            --text-muted: #78909c; 
            --success-color: #1b5e20; 
            --border-color: #e0e0e0; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body {
            background-color: var(--bg-color);
            background-image: linear-gradient(135deg, #fff5f5 0%, #f4f7f6 50%, #ffffff 100%);
            color: var(--text-dark); 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 550px; }

        /* HEADER BRAND - MERAH PUTIH ELEGAN */
        .app-header { 
            text-align: center; 
            margin-bottom: 30px; 
            border-bottom: 3px solid var(--steam-gold); 
            padding-bottom: 20px; 
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            padding-top: 20px;
        }
        .app-header h1 { 
            color: var(--steam-red); 
            font-size: 32px; 
            font-weight: 900; 
            letter-spacing: 1.5px; 
            text-transform: uppercase;
        }
        .app-header h1 span { 
            color: #ffffff; 
            background: var(--steam-red); 
            padding: 3px 12px; 
            border-radius: 6px; 
            margin-left: 5px;
        }
        .app-header p { 
            color: #455a64; 
            font-size: 13px; 
            font-weight: 700; 
            margin-top: 10px; 
            text-transform: uppercase; 
            letter-spacing: 2px;
        }
        
        /* CARD UTAMA - LIST EMAS */
        .card {
            background-color: var(--white-card); 
            border-radius: 16px; 
            padding: 30px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            border: 2px solid var(--steam-gold); 
            margin-bottom: 25px; 
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content:''; position: absolute; top:0; left:0; width: 100%; height: 6px;
            background: linear-gradient(90deg, var(--steam-red) 0%, var(--steam-gold) 50%, var(--steam-red) 100%);
        }

        h2 { 
            font-size: 18px; 
            margin-bottom: 25px; 
            text-align: center; 
            text-transform: uppercase; 
            color: var(--steam-red); 
            font-weight: 700;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        /* FORM FIELD */
        .form-group { margin-bottom: 20px; }
        label { 
            display: block; 
            font-size: 12px; 
            text-transform: uppercase; 
            color: var(--steam-red); 
            margin-bottom: 8px; 
            font-weight: 700; 
        }
        input, select, textarea { 
            width: 100%; 
            padding: 14px; 
            background-color: #fbfbfb; 
            border: 1.5px solid var(--border-color); 
            border-radius: 10px; 
            color: var(--text-dark); 
            font-size: 15px;
            transition: all 0.3s ease;
        }
        input:focus, select:focus, textarea:focus { 
            outline: none; 
            border-color: var(--steam-red); 
            background-color: #fff; 
            box-shadow: 0 0 10px rgba(198, 40, 40, 0.08);
        }
        
        /* TOMBOL UTAMA */
        .btn {
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, var(--steam-red) 0%, #a01f1f 100%); 
            border: 2px solid var(--steam-gold); 
            border-radius: 12px; 
            color: white; 
            font-weight: 700; 
            text-transform: uppercase; 
            font-size: 15px;
            cursor: pointer; 
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(198, 40, 40, 0.15);
        }
        .btn:hover {
            background: linear-gradient(135deg, #b71c1c 0%, var(--steam-red) 100%); 
            transform: translateY(-2px);
        }
        .btn:disabled { background: #bdbdbd !important; border-color: #9e9e9e !important; color: #f5f5f5; cursor: not-allowed; transform: none; box-shadow: none; }

        /* TABS NAVIGASI */
        .nav-tabs { display: flex; gap: 12px; margin-bottom: 25px; flex-wrap: wrap; }
        .tab-btn { 
            flex: 1; min-width: 100px; padding: 14px; 
            background-color: #fff; 
            border: 1.5px solid var(--border-color); 
            color: var(--text-dark); 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 12px; 
            text-transform: uppercase; 
        }
        .tab-btn.active { 
            background-color: var(--steam-red); 
            color: #ffffff; 
            border-color: var(--steam-red);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* PESAN STATUS */
        #statusMessage { padding: 16px; border-radius: 12px; text-align: center; font-size: 14px; margin-bottom: 20px; display: none; font-weight: 600; }
        .status-success { background-color: #e8f5e9; color: var(--success-color); border: 1px solid #a5d6a7; }
        .status-error { background-color: #ffebee; color: var(--steam-red); border: 1px solid #ef9a9a; }
        .status-loading { background-color: #fff3e0; color: #e65100; border: 1px solid #ffcc80; }
        
        #areaGaji { display: none; }
        
        /* NOTIFIKASI TARGET EMAS */
        .modal-target {
            display: none; background: linear-gradient(135deg, var(--steam-gold) 0%, #b89020 100%); 
            color: #fff; padding: 18px; border-radius: 12px; text-align: center;
            font-weight: bold; font-size: 16px; margin-bottom: 20px; 
            border: 2px solid #fff;
            animation: guncangEmas 0.6s ease-in-out infinite alternate;
        }
        @keyframes guncangEmas { from { transform: scale(0.97); } to { transform: scale(1.03); } }

        /* STYLING TABEL LAPORAN */
        .table-laporan { width:100%; font-size:14px; text-align:left; border-collapse:collapse; background:#fff; border-radius:8px; overflow:hidden; }
        .table-laporan th { background-color: #f8fbfd; padding:12px; color:var(--steam-red); font-weight:700; text-transform:uppercase; font-size:11px; border-bottom:2px solid var(--border-color); }
        .table-laporan td { padding:14px 12px; border-bottom:1px solid #eee; color:var(--text-dark); }
    </style>
</head>
<body>

    <div class="container">
        <div class="app-header">
            <h1>STEAM <span>MP 7000</span></h1>
            <p>JUJUR DISIPLIN DAN TANGGUNG JAWAB</p>
        </div>

        <div id="notifTarget" class="modal-target">🎉 LUAR BIASA! TEMBUS TARGET UTAMA! 🚀<br><small style="font-size:12px; font-weight:500;">Bonus Mutlak Telah Ditambahkan ke Sistem</small></div>
        <div id="statusMessage"></div>
        <div id="areaGaji"></div>

        <div id="gerbangAuth">
            <div id="boxLogin" class="card">
                <h2>VERIFIKASI AKSES ANGGOTA</h2>
                <form id="formLogin" onsubmit="handleAuth(event)">
                    <div class="form-group">
                        <label>ID KARYAWAN (USERNAME)</label>
                        <input type="number" id="login_user" placeholder="Masukkan ID Anda" required>
                    </div>
                    <div class="form-group">
                        <label>KATA SANDI KEAMANAN</label>
                        <input type="password" id="login_sandi" placeholder="Masukkan Sandi" required>
                    </div>
                    <button type="submit" id="btn_login" class="btn">MASUK PANDU KONTROL</button>
                </form>
            </div>
        </div>

        <div id="halamanUtama" style="display: none;">
            <div id="boxFiturKT" style="display:none; margin-bottom:20px;">
                <button type="button" class="btn" style="background: linear-gradient(135deg, #2e7d32 0%, #1b5e20 100%); border-color:#a5d6a7;" onclick="cekPendapatanKT()">💰 CEK TOTAL DATA UNIT SAYA HARI INI</button>
            </div>

            <div id="boxFiturOwner" style="display:none; margin-bottom:20px;">
                <button type="button" class="btn" style="background: linear-gradient(135deg, var(--steam-gold) 0%, #b89020 100%); color:#fff; border-color: #fff;" onclick="bukaRekapOwner()">🔄 SEGARKAN NERACA KEUANGAN OWNER</button>
            </div>

            <div class="nav-tabs" id="menuNavigasi">
                <button id="nav_pemasukan" class="tab-btn" onclick="switchTab('input-pemasukan')">Pemasukan</button>
                <button id="nav_pengeluaran" class="tab-btn" onclick="switchTab('input-pengeluaran')">Pengeluaran</button>
            </div>

            <div id="input-pemasukan" class="tab-content">
                <div class="card">
                    <h2>INPUT UNIT CUCIAN CABANG</h2>
                    <form id="formPemasukan" onsubmit="submitData(event, 'Pemasukan')">
                        <div class="form-group">
                            <label>Tanggal Operasional</label>
                            <input type="date" id="tgl_pemasukan" required>
                        </div>
                        <div class="form-group">
                            <label>Lokasi Cabang</label>
                            <select id="cabang_pemasukan" required>
                                <option value="Cabang Grobogan">Cabang Grobogan (Target: 100)</option>
                                <option value="Cabang Palis">Cabang Palis (Target: 50)</option>
                                <option value="Cabang Cayur">Cabang Cayur (Target: 50)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Anggota Yang Mencuci</label>
                            <select id="karyawan_pemasukan" required>
                                <option value="">-- Memuat Data Anggota --</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Jumlah Unit (Motor)</label>
                            <input type="number" id="unit_pemasukan" placeholder="Masukkan total motor" oninput="hitungKotorEstimasi()" required>
                        </div>
                        <div class="form-group">
                            <label>Estimasi Upah Kotor Karyawan (Porsi Rp3.000)</label>
                            <input type="text" id="nominal_pemasukan_display" value="Rp 0" disabled style="font-weight:bold; color: var(--success-color); background: #f1f8e9; border-color:#c5e1a5;">
                        </div>
                        <div class="form-group">
                            <label>Uang Tips Pelanggan (Manual)</label>
                            <input type="number" id="tips_pemasukan" placeholder="Isi 0 jika tidak ada" value="0" required>
                        </div>
                        <div class="form-group">
                            <label>Potongan Kasbon Anggota (Manual)</label>
                            <input type="number" id="kasbon_pemasukan" placeholder="Isi 0 jika tidak ada" value="0" required>
                        </div>
                        <div class="form-group">
                            <label>Iuran Kebersihan Wifi Harian</label>
                            <input type="text" value="Rp 1.000 (Dipotong Otomatis)" disabled style="color:var(--steam-red); font-weight:bold; background:#fff5f5;">
                        </div>
                        <div class="form-group">
                            <label>Catatan Lapangan (Opsional)</label>
                            <textarea id="ket_pemasukan" rows="2" placeholder="Keterangan tambahan..."></textarea>
                        </div>
                        <button type="submit" id="btn_submit_pemasukan" class="btn">KIRIM FINAL DATA PEMASUKAN</button>
                    </form>
                </div>
            </div>

            <div id="input-pengeluaran" class="tab-content">
                <div class="card">
                    <h2>INPUT BIAYA OPERASIONAL TOKO</h2>
                    <form id="formPengeluaran" onsubmit="submitData(event, 'Pengeluaran')">
                        <div class="form-group">
                            <label>Tanggal Pengeluaran</label>
                            <input type="date" id="tgl_pengeluaran" required>
                        </div>
                        <div class="form-group">
                            <label>Lokasi Cabang</label>
                            <select id="cabang_pengeluaran" required>
                                <option value="Cabang Grobogan">Cabang Grobogan</option>
                                <option value="Cabang Palis">Cabang Palis</option>
                                <option value="Cabang Cayur">Cabang Cayur</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Kategori Alokasi Dana</label>
                            <select id="kategori_pengeluaran" required>
                                <option value="Beras Karyawan">Beras Karyawan</option>
                                <option value="Kopi Karyawan">Kopi Karyawan</option>
                                <option value="Listrik Token">Listrik Token</option>
                                <option value="Sabun">Sabun</option>
                                <option value="Maintenance">Maintenance</option>
                                <option value="Perawatan">Perawatan</option>
                                <option value="Oli">Oli</option>
                                <option value="Wifi">Wifi</option>
                                <option value="Lain-lain">Lain-lain</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Nominal Dana Keluar (Rp)</label>
                            <input type="number" id="nominal_pengeluaran" placeholder="Contoh: 50000" required>
                        </div>
                        <div class="form-group">
                            <label>Deskripsi Detail Pembelian (Wajib Jelas)</label>
                            <textarea id="ket_pengeluaran" rows="2" placeholder="Beli apa, merk apa..." required></textarea>
                        </div>
                        <button type="submit" id="btn_submit_pengeluaran" class="btn">KIRIM FINAL DATA PENGELUARAN</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxWBYtbeBe3-xH3R80axowIeVbI8n6fc-x3qwTbZammMY3dpsAOYR2y9DcD6R5AURaI/exec";
        let SESSION_USER = null;
        let ARRAY_KARYAWAN = [];

        window.onload = function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('tgl_pemasukan').value = today;
            document.getElementById('tgl_pengeluaran').value = today;
        };

        function loadKaryawanDropdown() {
            fetch(WEB_APP_URL + "?action=getKaryawanList")
            .then(res => res.json())
            .then(res => {
                if(res.status === "success") {
                    ARRAY_KARYAWAN = res.data;
                    let dropdown = document.getElementById('karyawan_pemasukan');
                    dropdown.innerHTML = '<option value="">-- Pilih Karyawan --</option>';
                    res.data.forEach(k => {
                        dropdown.innerHTML += `<option value="${k.id}">${k.nama} [${k.jabatan}]</option>`;
                    });
                }
            });
        }

        function handleAuth(event) {
            event.preventDefault();
            document.getElementById('btn_login').disabled = true;
            showStatus("Melakukan enkripsi & verifikasi data...", "loading");

            let user = document.getElementById('login_user').value;
            let sandi = document.getElementById('login_sandi').value;
            let url = `${WEB_APP_URL}?action=loginUser&username=${encodeURIComponent(user)}&sandi=${encodeURIComponent(sandi)}`;

            fetch(url)
            .then(res => res.json())
            .then(data => {
                document.getElementById('btn_login').disabled = false;
                if(data.status === "success") {
                    SESSION_USER = data;
                    showStatus("Akses dibuka. Selamat bekerja " + data.nama, "success");
                    document.getElementById('gerbangAuth').style.display = 'none';

                    if(data.jabatan === "Karyawan") {
                        document.getElementById('halamanUtama').style.display = 'none';
                        document.getElementById('areaGaji').style.display = 'block';
                        tampilkanRincianGajiKaryawan(data.gaji, data.nama);
                    } 
                    else if(data.jabatan === "Kepala Toko") {
                        document.getElementById('halamanUtama').style.display = 'block';
                        document.getElementById('boxFiturKT').style.display = 'block';
                        document.getElementById('boxFiturOwner').style.display = 'none';
                        document.getElementById('nav_pengeluaran').style.display = 'none'; 
                        loadKaryawanDropdown();
                        switchTab('input-pemasukan');
                    } 
                    else if(data.jabatan === "Admin" || data.jabatan === "Owner") {
                        document.getElementById('halamanUtama').style.display = 'block';
                        document.getElementById('menuNavigasi').style.display = 'flex';
                        document.getElementById('boxFiturOwner').style.display = 'block';
                        document.getElementById('boxFiturKT').style.display = 'none';
                        loadKaryawanDropdown();
                        switchTab('input-pemasukan');
                        bukaRekapOwner();
                    }
                } else {
                    showStatus(data.message, "error");
                }
            }).catch(() => {
                document.getElementById('btn_login').disabled = false;
                showStatus("Koneksi gagal. Periksa sinyal internet Anda.", "error");
            });
        }

        function bukaRekapOwner() {
            showStatus("Memperbarui neraca keuangan owner...", "loading");
            fetch(WEB_APP_URL + "?action=getLaporanOwner")
            .then(res => res.json())
            .then(res => {
                if(res.status === "success") {
                    showStatus("Data pembukuan disinkronkan.", "success");
                    let targetBox = document.getElementById('areaGaji');
                    targetBox.style.display = "block";

                    let listGajiHtml = "";
                    for (let namaK in res.rekapKaryawan) {
                        listGajiHtml += `<tr style="border-bottom:1px solid #eee;"> <td style="padding:10px;">${namaK}</td> <td style="padding:10px; font-weight:bold; text-align:right; color:var(--steam-red);">Rp ${res.rekapKaryawan[namaK].toLocaleString('id-ID')}</td> </tr>`;
                    }
                    if(listGajiHtml === "") listGajiHtml = "<tr><td colspan='2' style='text-align:center; padding:10px; color:#999;'>Belum ada data pendapatan</td></tr>";

                    targetBox.innerHTML = `
                        <div class="card" style="background: #ffffff; border: 2px solid var(--steam-gold); margin-bottom: 25px; padding: 20px;">
                            <h3 style="color:var(--steam-red); font-size:13px; border-left:4px solid var(--steam-gold); padding-left:10px; margin-bottom:15px; text-transform:uppercase;">📊 RINGKASAN KAS UTAMA OWNER (Porsi Rp4.000)</h3>
                            <table style="width:100%; font-size:14px; text-align:left; border-collapse:collapse; margin-bottom:20px;">
                                <tr style="border-bottom:1px solid #eee;"><td style="padding:10px; color:#555;">Total Pemasukan Kotor</td><td style="padding:10px; font-weight:bold; color:#2e7d32; text-align:right;">Rp ${res.kotorOwner.toLocaleString('id-ID')}</td></tr>
                                <tr style="border-bottom:1px solid #eee;"><td style="padding:10px; color:#555;">Total Pengeluaran Toko</td><td style="padding:10px; font-weight:bold; color:var(--steam-red); text-align:right;">- Rp ${res.pengeluaran.toLocaleString('id-ID')}</td></tr>
                                <tr style="background:#fff5f5; font-weight:bold;"><td style="padding:12px; border-radius:6px 0 0 6px; color:var(--text-dark);">PROFIT BERSIH SEKARANG</td><td style="padding:12px; text-align:right; border-radius:0 6px 6px 0; color:var(--success-color); font-size:16px;">Rp ${res.bersihOwner.toLocaleString('id-ID')}</td></tr>
                            </table>
                            
                            <h3 style="color:var(--text-dark); font-size:13px; border-left:4px solid var(--steam-red); padding-left:10px; margin-bottom:10px; text-transform:uppercase;">👥 REKAP GAJI BERJALAN KARYAWAN</h3>
                            <table class="table-laporan">
                                ${listGajiHtml}
                            </table>
                        </div>`;
                }
            });
        }

        function cekPendapatanKT() {
            showStatus("Menarik data inputan...", "loading");
            fetch(`${WEB_APP_URL}?action=getPendapatanCabang&idKT=${SESSION_USER.idUser}`)
            .then(res => res.json())
            .then(res => {
                if(res.status === "success") {
                    alert(`Yth. Kepala Toko ${SESSION_USER.nama},\n\nTotal Kas Kotor (Porsi Owner Rp4.000) dari unit yang Anda input hari ini berjumlah:\nRp ${res.total.toLocaleString('id-ID')}`);
                    showStatus("Perhitungan selesai.", "success");
                }
            });
        }

        function tampilkanRincianGajiKaryawan(dataGaji, nama) {
            let targetBox = document.getElementById('areaGaji');
            if(!dataGaji || dataGaji.length === 0) {
                targetBox.innerHTML = `<div class="card" style="text-align:center; padding:30px;"><p style="color:var(--steam-red); font-weight:bold; font-size:16px;">Halo ${nama},</p><p style="font-size:13px; margin-top:5px; color:#666;">Anda belum memiliki riwayat cuci hari ini.</p></div>`;
                return;
            }

            let totalUnit = 0, totalTips = 0, totalBonus = 0, totalKasbon = 0;
            let totalHariKerja = dataGaji.length;

            dataGaji.forEach(item => {
                totalUnit += parseInt(item.unit) || 0;
                totalTips += parseInt(item.tips) || 0;
                totalBonus += parseInt(item.bonus) || 0;
                totalKasbon += parseInt(item.kasbon) || 0;
            });

            let gajiKotorUnit = totalUnit * 3000; 
            let totalPotonganWifi = totalHariKerja * 1000;
            let gajiBersihFinal = (gajiKotorUnit + totalTips + totalBonus) - totalKasbon - totalPotonganWifi;

            targetBox.innerHTML = `
                <div class="card" style="margin-bottom: 25px; padding: 20px;">
                    <h3 style="color:var(--steam-red); font-size:14px; border-left:4px solid var(--steam-gold); padding-left:10px; margin-bottom:4px; text-transform:uppercase;">SLIP PENDAPATAN ANGGOTA</h3>
                    <p style="font-size:13px; color:#555; margin-bottom:15px;">Nama: <span style="color:var(--text-dark); font-weight:bold;">${nama}</span></p>
                    <table style="width:100%; font-size:14px; text-align:left; border-collapse:collapse;">
                        <tr style="border-bottom:1px solid #eee;"><td style="padding:10px; color:#666;">Total Unit Di-steam</td><td style="padding:10px; font-weight:bold; text-align:right;">${totalUnit} Motor</td></tr>
                        <tr style="border-bottom:1px solid #eee;"><td style="padding:10px; color:#666;">Upah Hasil Cuci (x3.000)</td><td style="padding:10px; text-align:right; font-weight:600;">Rp ${gajiKotorUnit.toLocaleString('id-ID')}</td></tr>
                        <tr style="border-bottom:1px solid #eee;"><td style="padding:10px; color:#2e7d32; text-align:right;">+ Rp ${totalTips.toLocaleString('id-ID')}</td></tr>
                        <tr style="border-bottom:1px solid #eee;"><td style="padding:10px; color:#666;">Bonus Capaian Target</td><td style="padding:10px; color:var(--steam-gold); font-weight:bold; text-align:right;">+ Rp ${totalBonus.toLocaleString('id-ID')}</td></tr>
                        <tr style="border-bottom:1px solid #eee;"><td style="padding:10px; color:#666;">Potongan Kasbon</td><td style="padding:10px; color:var(--steam-red); text-align:right;">- Rp ${totalKasbon.toLocaleString('id-ID')}</td></tr>
                        <tr style="border-bottom:1px solid #ddd;"><td style="padding:10px; color:#666;">Kebersihan Wifi Alat Harian</td><td style="padding:10px; color:var(--steam-red); text-align:right;">- Rp ${totalPotonganWifi.toLocaleString('id-ID')}</td></tr>
                        <tr style="background:#f1f8e9; font-weight:bold; font-size:16px;"><td style="padding:12px; border-radius:4px 0 0 4px; color:var(--text-dark);">TOTAL TERIMA BERSIH</td><td style="padding:12px; text-align:right; border-radius:0 4px 4px 0; color:var(--success-color);">Rp ${gajiBersihFinal.toLocaleString('id-ID')}</td></tr>
                    </table>
                </div>`;
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).style.display = 'block';
            if(tabId === 'input-pemasukan') document.getElementById('nav_pemasukan').classList.add('active');
            if(tabId === 'input-pengeluaran') document.getElementById('nav_pengeluaran').classList.add('active');
        }

        function hitungKotorEstimasi() {
            let unit = document.getElementById('unit_pemasukan').value;
            let total = unit ? parseInt(unit) * 3000 : 0;
            document.getElementById('nominal_pemasukan_display').value = "Rp " + total.toLocaleString('id-ID');
        }

        function showStatus(text, type) {
            const msgBox = document.getElementById('statusMessage');
            msgBox.innerText = text; msgBox.className = '';
            if(type === 'success') msgBox.classList.add('status-success');
            else if(type === 'error') msgBox.classList.add('status-error');
            else if(type === 'loading') msgBox.classList.add('status-loading');
            msgBox.style.display = 'block';
            if(type !== 'loading') { setTimeout(() => { msgBox.style.display = 'none'; }, 4000); }
        }

        function submitData(event, tipeForm) {
            event.preventDefault();
            let btnSubmit = (tipeForm === 'Pemasukan') ? document.getElementById('btn_submit_pemasukan') : document.getElementById('btn_submit_pengeluaran');
            btnSubmit.disabled = true;
            showStatus("Menyimpan data aman ke cloud...", "loading");

            let urlParams = new URLSearchParams();
            urlParams.append("action", "insertRow");
            urlParams.append("tipe", tipeForm);

            const formatTanggalSistem = (idInput) => {
                let d = new Date(document.getElementById(idInput).value);
                return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth()+1).padStart(2, '0')}/${d.getFullYear()}`;
            };

            if(tipeForm === 'Pemasukan') {
                let rDate = document.getElementById('tgl_pemasukan').value;
                let idK = document.getElementById('karyawan_pemasukan').value;
                let objK = ARRAY_KARYAWAN.find(x => String(x.id) === String(idK));

                urlParams.append("tanggal", formatTanggalSistem('tgl_pemasukan'));
                urlParams.append("cabang", document.getElementById('cabang_pemasukan').value);
                urlParams.append("kategori", "Pemasukan Unit");
                urlParams.append("unit", document.getElementById('unit_pemasukan').value);
                urlParams.append("keterangan", document.getElementById('ket_pemasukan').value);
                urlParams.append("tanggal_asli", rDate);
                urlParams.append("karyawan_id", idK);
                urlParams.append("karyawan_nama", objK.nama);
                urlParams.append("karyawan_jabatan", objK.jabatan);
                urlParams.append("tips", document.getElementById('tips_pemasukan').value);
                urlParams.append("kasbon", document.getElementById('kasbon_pemasukan').value);
                urlParams.append("operator_id", SESSION_USER.idUser);
            } else {
                let rDate = document.getElementById('tgl_pengeluaran').value;
                urlParams.append("tanggal", formatTanggalSistem('tgl_pengeluaran'));
                urlParams.append("cabang", document.getElementById('cabang_pengeluaran').value);
                urlParams.append("kategori", document.getElementById('kategori_pengeluaran').value);
                urlParams.append("nominal", document.getElementById('nominal_pengeluaran').value);
                urlParams.append("keterangan", document.getElementById('ket_pengeluaran').value);
                urlParams.append("tanggal_asli", rDate);
            }

            fetch(WEB_APP_URL, {
                method: "POST",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: urlParams.toString()
            })
            .then(res => res.text())
            .then(resText => {
                btnSubmit.disabled = false;
                if(resText === "SUCCESS" || resText === "SUCCESS_TARGET") {
                    showStatus("Data Berhasil Disimpan!", "success");
                    
                    if(resText === "SUCCESS_TARGET") {
                        document.getElementById('notifTarget').style.display = 'block';
                        setTimeout(() => { document.getElementById('notifTarget').style.display = 'none'; }, 7000);
                    }

                    if(tipeForm === 'Pemasukan') {
                        document.getElementById('formPemasukan').reset();
                        document.getElementById('nominal_pemasukan_display').value = "Rp 0";
                    } else {
                        document.getElementById('formPengeluaran').reset();
                    }
                    
                    const today = new Date().toISOString().split('T')[0];
                    document.getElementById('tgl_pemasukan').value = today;
                    document.getElementById('tgl_pengeluaran').value = today;

                    if(SESSION_USER.jabatan === "Owner" || SESSION_USER.jabatan === "Admin") {
                        bukaRekapOwner();
                    }
                } else {
                    showStatus("Gagal memproses ke cloud.", "error");
                }
            }).catch(() => {
                btnSubmit.disabled = false;
                showStatus("Gagal menghubungi server.", "error");
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CONTROL PANEL - STEAM MP 7000</title>
    
    <style>
        /* ==========================================================================
           1. VARIABEL GLOBAL WARNA PREMIUM (MERAH, PUTIH GRADASI & LIST EMAS)
           ========================================================================== */
        :root {
            --steam-red-utama: #cc1818;
            --steam-red-tua: #8a0000;
            --steam-red-terang: #ff3333;
            --steam-dark-solid: #121212;
            --steam-dark-sedang: #222222;
            --steam-white-pure: #ffffff;
            --steam-white-soft: #f9f9f9;
            --steam-white-abu: #f5f5f5;
            --steam-gold-solid: #d4af37;
            --steam-gold-muda: #f3e5ab;
            --steam-gold-tua: #aa7c11;
            --sukses-hijau-tua: #1b5e20;
            --sukses-hijau-terang: #2e7d32;
            --sukses-hijau-bg: #e8f5e9;
            --warning-oranye-tua: #e65100;
            --warning-oranye-bg: #fff3e0;
            --border-abu-soft: #e0e0e0;
            --border-gold-soft: #ffe082;
        }

        /* ==========================================================================
           2. RESET ELEMENT GLOBAL & LAYOUT BODY (GRADASI MERAH PUTIH)
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--steam-red-tua) 0%, var(--steam-red-utama) 40%, var(--steam-white-soft) 70%, var(--steam-white-pure) 100%);
            color: var(--steam-dark-sedang);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        /* ==========================================================================
           3. BINGKAI CONTAINER UTAMA DENGAN LIST EMAS MEWAH
           ========================================================================== */
        .container {
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 14px;
            border: 3px solid var(--steam-gold-solid);
            box-shadow: 0 10px 30px rgba(0,0,0,0.25), 0 0 20px rgba(212, 175, 55, 0.4);
            padding: 25px;
            position: relative;
        }

        /* ==========================================================================
           4. DESAIN KEPALA LOGO HEADER & SLOGAN OPERASIONAL TIM
           ========================================================================== */
        .header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 18px;
            border-bottom: 3px solid var(--steam-gold-solid);
        }

        .header h1 {
            font-size: 28px;
            color: var(--steam-red-utama);
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 1px 1px 0px #fff, 2px 2px 0px rgba(0,0,0,0.15);
        }

        .slogan-box {
            margin-top: 8px;
            margin-bottom: 5px;
        }

        .slogan-teks {
            font-size: 11px;
            font-weight: 900;
            color: var(--steam-dark-solid);
            letter-spacing: 2.5px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--steam-gold-muda) 0%, var(--steam-gold-solid) 50%, var(--steam-gold-tua) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .sub-title {
            font-size: 11px;
            color: #666666;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* ==========================================================================
           5. GAYA FORM INPUT & LABEL LAPANGAN (FORM GROUP STYLE)
           ========================================================================== */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 800;
            margin-bottom: 7px;
            color: var(--steam-dark-solid);
            letter-spacing: 0.7px;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 13px 15px;
            border: 1px solid var(--border-abu-soft);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            background-color: var(--steam-white-soft);
            color: var(--steam-dark-solid);
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--steam-gold-solid);
            background-color: var(--steam-white-pure);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.25);
        }

        .form-group select {
            width: 100%;
            padding: 13px 15px;
            border: 1px solid var(--border-abu-soft);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            background-color: var(--steam-white-soft);
            color: var(--steam-dark-solid);
            transition: all 0.3s ease;
        }

        .form-group select:focus {
            outline: none;
            border-color: var(--steam-gold-solid);
            background-color: var(--steam-white-pure);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.25);
        }

        .form-group textarea {
            width: 100%;
            padding: 13px 15px;
            border: 1px solid var(--border-abu-soft);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            background-color: var(--steam-white-soft);
            color: var(--steam-dark-solid);
            transition: all 0.3s ease;
            resize: vertical;
        }

        .form-group textarea:focus {
            outline: none;
            border-color: var(--steam-gold-solid);
            background-color: var(--steam-white-pure);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.25);
        }

        /* ==========================================================================
           6. STRUKTUR GAYA TOMBOL-TOMBOL AKSI (BUTTONS COLLECTION)
           ========================================================================== */
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            text-transform: uppercase;
            letter-spacing: 0.7px;
        }

        .btn-login-sistem {
            background-color: var(--steam-red-utama);
            color: var(--steam-white-pure);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 12px rgba(204, 24, 24, 0.35);
        }

        .btn-login-sistem:hover {
            background-color: #b51212;
            transform: translateY(-1px);
        }

        .btn-login-sistem:active {
            transform: translateY(1px);
        }

        .btn-simpan-transaksi {
            background-color: var(--sukses-hijau-tua);
            color: var(--steam-white-pure);
            box-shadow: 0 4px 12px rgba(27, 94, 32, 0.3);
            margin-top: 12px;
        }

        .btn-simpan-transaksi:hover {
            background-color: var(--sukses-hijau-terang);
            transform: translateY(-1px);
        }

        /* Tombol SOS Darurat Khusus Lapangan Berdenyut */
        .btn-aksi-sos-darurat {
            background: linear-gradient(135deg, var(--steam-red-utama) 0%, #7f0000 100%);
            border: 2px solid var(--steam-gold-solid);
            color: var(--steam-white-pure);
            font-weight: 900;
            margin-top: 18px;
            box-shadow: 0 5px 15px rgba(204, 24, 24, 0.45);
            animation: efekDenyutSOS 1.6s infinite;
        }

        .btn-aksi-sos-darurat:hover {
            filter: brightness(1.1);
        }

        /* Tombol Input Keluhan Kerja */
        .btn-aksi-keluhan-tim {
            background: linear-gradient(135deg, #444444 0%, var(--steam-dark-solid) 100%);
            border: 1px solid var(--steam-gold-solid);
            color: var(--steam-gold-solid);
            font-weight: 800;
            margin-top: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .btn-aksi-keluhan-tim:hover {
            background: #333333;
        }

        .btn-keluar-aplikasi {
            background-color: var(--steam-white-abu);
            color: #666666;
            border: 1px solid var(--border-abu-soft);
            margin-top: 25px;
            font-size: 12px;
            padding: 11px;
            font-weight: 700;
        }

        .btn-keluar-aplikasi:hover {
            background-color: #e0e0e0;
            color: #333333;
        }

        /* Animasi Berdenyut Kritis */
        @keyframes efekDenyutSOS {
            0% {
                transform: scale(1);
                box-shadow: 0 0 10px rgba(204, 24, 24, 0.5);
            }
            50% {
                transform: scale(1.03);
                box-shadow: 0 0 22px rgba(204, 24, 24, 0.8), 0 0 12px rgba(212, 175, 55, 0.6);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 10px rgba(204, 24, 24, 0.5);
            }
        }

        /* ==========================================================================
           7. GAYA KARTU TAMPILAN MODUL & SLIP KEUANGAN (CARDS STYLE)
           ========================================================================== */
        .card-box {
            background: var(--steam-white-pure);
            border: 1px solid var(--border-abu-soft);
            border-top: 4px solid var(--steam-red-utama);
            border-radius: 8px;
            padding: 18px;
            margin-top: 18px;
        }

        .card-box h2 {
            font-size: 16px;
            color: var(--steam-dark-solid);
            margin-bottom: 14px;
            text-align: center;
            font-weight: 800;
            letter-spacing: 0.6px;
            text-transform: uppercase;
        }

        .badge-info-hari {
            background: var(--warning-oranye-bg);
            color: #b78103;
            border: 1px solid var(--border-gold-soft);
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .badge-info-hari span {
            font-size: 15px;
            color: var(--steam-red-utama);
            font-weight: 900;
        }

        /* ==========================================================================
           8. NOTIFIKASI STATUS BOX DI ATAS FORM
           ========================================================================== */
        #statusBox {
            display: none;
            padding: 14px;
            border-radius: 6px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 18px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-loading { 
            background-color: #fff8e1; 
            color: #b78103; 
            border: 1px dashed var(--steam-gold-solid); 
        }
        
        .status-success { 
            background-color: var(--sukses-hijau-bg); 
            color: var(--sukses-hijau-tua); 
            border: 1px solid #81c784; 
        }
        
        .status-error { 
            background-color: #ffebee; 
            color: #c62828; 
            border: 1px solid #e57373; 
        }

        /* ==========================================================================
           9. STRUKTUR DESIGN TABEL DATA KEUANGAN KARYAWAN
           ========================================================================== */
        .tabel-data-gaji {
            width: 100%;
            font-size: 13px;
            border-collapse: collapse;
            margin-top: 12px;
        }

        .tabel-data-gaji tr {
            border-bottom: 1px solid var(--steam-white-abu);
        }

        .tabel-data-gaji tr td {
            padding: 10px 5px;
            font-weight: 600;
        }

        .baris-total-bersih {
            background: #fafafa;
            font-weight: 900 !important;
            font-size: 15px;
            border-top: 2px double var(--border-abu-soft);
            border-bottom: 2px double var(--border-abu-soft);
        }

        .baris-total-bersih td {
            padding: 12px 5px !important;
        }

        .teks-kanan { 
            text-align: right; 
        }
        
        .teks-tebal { 
            font-weight: bold; 
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- HEADER UTAMA DENGAN SLOGAN JUJU DISIPLIN TANGGUNG JAWAB -->
        <div class="header">
            <h1>Steam MP 7000</h1>
            <div class="slogan-box">
                <div class="slogan-teks">Jujur • Disiplin • Tanggung Jawab</div>
            </div>
            <div class="sub-title">Sistem Kontrol Panel Operasional</div>
        </div>

        <!-- AREA TAMPILAN NOTIFIKASI SISTEM -->
        <div id="statusBox"></div>

        <!-- ==========================================================================
           SECTION I: INTERFACE MODUL LOGIN USER
           ========================================================================== */ -->
        <div id="panelLogin">
            <div class="form-group">
                <label for="username">ID Username Anggota</label>
                <input type="text" id="username" placeholder="Masukkan ID Anggota Lapangan..." autocomplete="off">
            </div>
            
            <div class="form-group">
                <label for="sandi">Kata Sandi Keamanan</label>
                <input type="password" id="sandi" placeholder="Masukkan Sandi Akses Secure...">
            </div>
            
            <button type="button" class="btn-login-sistem" onclick="eksekusiLoginSistemUtama()">Login System</button>
        </div>


        <!-- ==========================================================================
           SECTION II: INTERFACE DASHBOARD UTAMA (INPUT DATA & SLIP FINANSIAL)
           ========================================================================== */ -->
        <div id="panelDashboard" style="display: none;">
            
            <!-- FORMULIR INPUT DATA HARIAN: KHUSUS KEPALA TOKO & ADMIN -->
            <div id="modulInputTransaksi" class="card-box" style="display: none;">
                <h2>Form Input Data Cucian Harian</h2>
                
                <form id="formTransaksi">
                    <div class="form-group">
                        <label for="inputKaryawan">Pilih Anggota Karyawan</label>
                        <select id="inputKaryawan" required>
                            <option value="">-- Pilih Nama Karyawan Lapangan --</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="inputUnit">Jumlah Unit Motor (Qty)</label>
                        <input type="number" id="inputUnit" min="0" placeholder="Masukkan jumlah unit motor..." required>
                    </div>
                    
                    <div class="form-group">
                        <label for="inputTips">Total Tips Pelanggan (Rp)</label>
                        <input type="number" id="inputTips" min="0" value="0" placeholder="Masukkan nominal tips jika ada...">
                    </div>
                    
                    <div class="form-group">
                        <label for="inputKasbon">Potongan Kasbon Harian (Rp)</label>
                        <input type="number" id="inputKasbon" min="0" value="0" placeholder="Masukkan nominal kasbon jika ada...">
                    </div>
                    
                    <div class="form-group">
                        <label for="inputCatatan">Catatan Lapangan / Keterangan</label>
                        <textarea id="inputCatatan" rows="2" placeholder="Tulis keterangan opsional harian di sini..."></textarea>
                    </div>
                    
                    <button type="button" class="btn-simpan-transaksi" onclick="prosesKirimDataTransaksiKeServer()">Simpan Data Transaksi</button>
                </form>
            </div>

            <!-- CONTAINER AKSI DYNAMIC UNTUK SLIP GAJI JALANAN KARYAWAN -->
            <div id="areaGaji"></div>
            
            <!-- TOMBOL KLAIM KELUAR AMAN DARI DASHBOARD -->
            <button type="button" class="btn-keluar-aplikasi" onclick="eksekusiKeluarAplikasiSistem()">Klaim Keluar (Logout)</button>
        </div>
    </div>

    <!-- ==========================================================================
       SECTION III: LOGIKA JAVASCRIPT DETAIl TANPA ADANYA PEMANGKASAN
       ========================================================================== -->
    <script>
        // Endpoint Utama Google Apps Script Web App
        const URL_GOOGLE_WEB_APP_SERVER = "https://script.google.com/macros/s/AKfycbxWBYtbeBe3-xH3R80axowIeVbI8n6fc-x3qwTbZammMY3dpsAOYR2y9DcD6R5AURaI/exec";
        
        // Objek Sesi Akun Aktif
        let SESSION_USER_DATA_ACTIVE = null;

        // FUNGSI LOGIKA LAMA: Memunculkan Box Pesan Notifikasi Atas
        function tampilkanStatusSistemNotifikasi(teksPesan, kategoriJenis) {
            let elemenBoxStatus = document.getElementById('statusBox');
            elemenBoxStatus.style.display = "block";
            elemenBoxStatus.className = ""; 
            elemenBoxStatus.innerText = teksPesan;
            
            if (kategoriJenis === "loading") {
                elemenBoxStatus.classList.add("status-loading");
            }
            if (kategoriJenis === "success") {
                elemenBoxStatus.classList.add("status-success");
            }
            if (kategoriJenis === "error") {
                elemenBoxStatus.classList.add("status-error");
            }
        }

        // FUNGSI LOGIKA LAMA: Menyembunyikan Kembali Box Pesan Notifikasi
        function hilangkanStatusSistemNotifikasi() {
            let elemenBoxStatus = document.getElementById('statusBox');
            elemenBoxStatus.style.display = "none";
        }

        // FUNGSI LOGIKA UTAMA: Proses Verifikasi Identitas Akun Pengguna
        function eksekusiLoginSistemUtama() {
            let inputIdUsername = document.getElementById('username').value;
            let inputSandiAkses = document.getElementById('sandi').value;

            // Validasi kelengkapan teks input manual
            if (inputIdUsername.trim() === "") {
                tampilkanStatusSistemNotifikasi("Gagal! Username Anggota tidak boleh kosong, Bos!", "error");
                return;
            }
            if (inputSandiAkses.trim() === "") {
                tampilkanStatusSistemNotifikasi("Gagal! Kata Sandi Keamanan wajib diisi, Bos!", "error");
                return;
            }

            tampilkanStatusSistemNotifikasi("Memproses verifikasi data login ke database pusat...", "loading");
            
            // Penyusunan parameter URL
            let alamatUrlVerifikasi = URL_GOOGLE_WEB_APP_SERVER + "?action=loginUser&username=" + encodeURIComponent(inputIdUsername) + "&sandi=" + encodeURIComponent(inputSandiAkses);

            // Pengiriman data via Fetch API Method GET
            fetch(alamatUrlVerifikasi)
            .then(function(responMentah) {
                return responMentah.json();
            })
            .then(function(responJson) {
                if (responJson.status === "success") {
                    hilangkanStatusSistemNotifikasi();
                    
                    // Simpan profile ke dalam session global browser
                    SESSION_USER_DATA_ACTIVE = responJson.profile;
                    
                    // Transisi perpindahan area tampilan box panel HTML
                    document.getElementById('panelLogin').style.display = "none";
                    document.getElementById('panelDashboard').style.display = "block";

                    // Pengecekan Level Jabatan User untuk Menentukan Hak Akses Form Input
                    let levelJabatanUser = responJson.role;
                    
                    if (levelJabatanUser === "Kepala Toko" || levelJabatanUser === "Admin") {
                        document.getElementById('modulInputTransaksi').style.display = "block";
                        prosesMuatDataDropdownKaryawanLapangan();
                    } else {
                        document.getElementById('modulInputTransaksi').style.display = "none";
                    }

                    // Tampilkan visual slip finansial jika level sesuai target sheet data
                    if (levelJabatanUser === "Karyawan" || levelJabatanUser === "Kepala Toko") {
                        prosesTampilkanRincianSlipGajiFinansial(responJson.gajiData);
                    } else if (levelJabatanUser === "Owner" || levelJabatanUser === "Admin") {
                        let areaKontenGaji = document.getElementById('areaGaji');
                        areaKontenGaji.innerHTML = `
                            <div class="card-box" style="text-align:center;">
                                <h3 style="color:var(--steam-red-utama);">Selamat Datang, Bos ${responJson.profile.nama}!</h3>
                                <p style="font-size:13px; margin-top:10px; color:#555555;">Status Hak Otoritas Anda: <b>[${responJson.role}]</b>.<br>Seluruh aktivitas kontrol data aman terkendali.</p>
                            </div>
                        `;
                    }
                } else {
                    tampilkanStatusSistemNotifikasi(responJson.message, "error");
                }
            })
            .catch(function(kesalahanError) {
                tampilkanStatusSistemNotifikasi("Koneksi internet bermasalah: " + kesalahanError.toString(), "error");
            });
        }

        // FUNGSI LOGIKA UTAMA: Mengambil Data List Anggota Aktif Untuk Dropdown Pilihan Form
        function prosesMuatDataDropdownKaryawanLapangan() {
            let elemenSelectDropdown = document.getElementById('inputKaryawan');
            let alamatUrlAmbilKaryawan = URL_GOOGLE_WEB_APP_SERVER + "?action=getKaryawanList";
            
            fetch(alamatUrlAmbilKaryawan)
            .then(function(responMurni) {
                return responMurni.json();
            })
            .then(function(kumpulanDataKaryawan) {
                // Set default data option list select awal
                elemenSelectDropdown.innerHTML = '<option value="">-- Pilih Nama Karyawan Lapangan --</option>';
                
                // Perulangan manual tebal untuk mengisi data dropdown option
                kumpulanDataKaryawan.forEach(function(objekKaryawan) {
                    let elemenOpsiBaru = document.createElement('option');
                    
                    // Penyimpanan data objek gabungan id dan nama ke dalam value string json
                    let dataObjekGabung = {
                        id: objekKaryawan.id, 
                        nama: objekKaryawan.nama
                    };
                    
                    elemenOpsiBaru.value = JSON.stringify(dataObjekGabung);
                    elemenOpsiBaru.innerText = "[" + objekKaryawan.id + "] " + objekKaryawan.nama;
                    elemenSelectDropdown.appendChild(elemenOpsiBaru);
                });
            })
            .catch(function(errorAmbilList) {
                console.log("Sistem log galat penarikan list karyawan: " + errorAmbilList);
            });
        }

        // FUNGSI LOGIKA UTAMA: Proses Pengiriman Hasil Input Data Cuci Harian Milik Kepala Toko
        function prosesKirimDataTransaksiKeServer() {
            let nilaiKaryawanDipilihRaw = document.getElementById('inputKaryawan').value;
            let nilaiJumlahUnitMotor = document.getElementById('inputUnit').value;
            let nominalTipsMasuk = document.getElementById('inputTips').value;
            let nominalKasbonDiambil = document.getElementById('inputKasbon').value;
            let isiTeksCatatanKhusus = document.getElementById('inputCatatan').value;

            // Validasi wajib isi field penting form sebelum dilempar ke server
            if (nilaiKaryawanDipilihRaw === "") {
                alert("Pemberitahuan: Nama Anggota Karyawan tidak boleh kosong, mohon dipilih!");
                return;
            }
            if (nilaiJumlahUnitMotor === "" || parseInt(nilaiJumlahUnitMotor) < 0) {
                alert("Pemberitahuan: Jumlah unit cucian motor wajib diisi dengan benar!");
                return;
            }

            // Ekstraksi data json string dari value dropdown
            let objekDataKaryawanTerpilih = JSON.parse(nilaiKaryawanDipilihRaw);
            
            tampilkanStatusSistemNotifikasi("Sedang mengunggah data input transaksi ke spreadsheet...", "loading");

            // Konstruksi Waktu Dan Penanggalan Realtime Indonesia Sisi Klien
            let objekTanggalHariIni = new Date();
            let tahunBerjalan = objekTanggalHariIni.getFullYear();
            let bulanBerjalan = objekTanggalHariIni.getMonth() + 1;
            let hariTanggalBerjalan = objekTanggalHariIni.getDate();
            
            let jamMenitBerjalan = objekTanggalHariIni.getHours() + ":" + objekTanggalHariIni.getMinutes();
            let formatTeksTanggalLengkap = tahunBerjalan + "-" + bulanBerjalan + "-" + hariTanggalBerjalan;

            // Alokasi parameter URL lengkap tebal terurai
            let alamatUrlKirimTransaksi = URL_GOOGLE_WEB_APP_SERVER + "?action=tambahTransaksiManual" +
                                         "&tanggal=" + formatTeksTanggalLengkap +
                                         "&waktu=" + jamMenitBerjalan +
                                         "&cabang=" + encodeURIComponent(SESSION_USER_DATA_ACTIVE.cabang) +
                                         "&idKaryawan=" + objekDataKaryawanTerpilih.id +
                                         "&namaKaryawan=" + encodeURIComponent(objekDataKaryawanTerpilih.nama) +
                                         "&unit=" + nilaiJumlahUnitMotor +
                                         "&tips=" + nominalTipsMasuk +
                                         "&kasbon=" + nominalKasbonDiambil +
                                         "&catatan=" + encodeURIComponent(isiTeksCatatanKhusus);

            // Pengiriman request via fetch server
            fetch(alamatUrlKirimTransaksi)
            .then(function(hasilResponServer) {
                return hasilResponServer.json();
            })
            .then(function(dataResponJson) {
                if (dataResponJson.status === "success") {
                    tampilkanStatusSistemNotifikasi("Berhasil! Seluruh data hasil cucian harian sukses tersimpan.", "success");
                    
                    // Bersihkan formulir isian setelah sukses kirim data
                    document.getElementById('formTransaksi').reset();
                    
                    // Refresh otomatis dashboard jika kepala toko ingin melihat rincian barunya
                    if (SESSION_USER_DATA_ACTIVE.jabatan === "Kepala Toko") {
                        let inputUserLama = document.getElementById('username').value;
                        let inputSandiLama = document.getElementById('sandi').value;
                        
                        let urlRefreshSirkulasi = URL_GOOGLE_WEB_APP_SERVER + "?action=loginUser&username=" + encodeURIComponent(inputUserLama) + "&sandi=" + encodeURIComponent(inputSandiLama);
                        
                        fetch(urlRefreshSirkulasi)
                        .then(function(resRef) { return resRef.json(); })
                        .then(function(jsonRef) {
                            if (jsonRef.status === "success") {
                                prosesTampilkanRincianSlipGajiFinansial(jsonRef.gajiData);
                            }
                        });
                    }
                } else {
                    tampilkanStatusSistemNotifikasi(dataResponJson.message, "error");
                }
            })
            .catch(function(errorKirimTransaksi) {
                tampilkanStatusSistemNotifikasi("Gagal menyimpan data transaksi: " + errorKirimTransaksi.toString(), "error");
            });
        }

        // FUNGSI LOGIKA UTAMA: Menghitung Data Array Finansial Dan Memunculkan Desain Tabel Slip Gaji Berjalan
        function prosesTampilkanRincianSlipGajiFinansial(dataGajiLengkap) {
            let elemenTargetBoxAreaGaji = document.getElementById('areaGaji');
            
            // Variabel Penampung Akumulasi Keuangan Finansial Berjalan
            let akumulasiTotalUnitCuci = 0;
            let akumulasiTotalTipsMasuk = 0;
            let akumulasiTotalBonusTarget = 0;
            let akumulasiTotalKasbonKaryawan = 0;

            // Kalkulasi loop baris data array sheet berjalan (Sheet1)
            dataGajiLengkap.gaji.forEach(function(barisItemGaji) {
                let unitMotorBaris = parseInt(barisItemGaji.unit);
                let tipsBaris = parseInt(barisItemGaji.tips);
                let bonusBaris = parseInt(barisItemGaji.bonus);
                let kasbonBaris = parseInt(barisItemGaji.kasbon);

                if (!isNaN(unitMotorBaris)) { akumulasiTotalUnitCuci += unitMotorBaris; }
                if (!isNaN(tipsBaris)) { akumulasiTotalTipsMasuk += tipsBaris; }
                if (!isNaN(bonusBaris)) { akumulasiTotalBonusTarget += bonusBaris; }
                if (!isNaN(kasbonBaris)) { akumulasiTotalKasbonKaryawan += kasbonBaris; }
            });

            // Logika Aturan Rumus Keuangan Steam MP 7000
            let hasilUpahCuciMurniKaryawan = akumulasiTotalUnitCuci * 3000;
            let totalPotonganOperationalWifi = dataGajiLengkap.hariBerjalan * 1000;
            
            // Rumus Total Sisa Terima Bersih (Upah Murni + Tips + Bonus) - Kasbon - Wifi
            let totalNominalTerimaBersihAkhir = (hasilUpahCuciMurniKaryawan + akumulasiTotalTipsMasuk + akumulasiTotalBonusTarget) - akumulasiTotalKasbonKaryawan - totalPotonganOperationalWifi;

            // Penyusunan struktur HTML Badge Hari Kerja Berjalan
            let strukturHtmlBadgeSiklusHari = "";
            strukturHtmlBadgeSiklusHari += '<div class="badge-info-hari">';
            strukturHtmlBadgeSiklusHari += 'Siklus Kerja Berjalan: <span>' + dataGajiLengkap.hariBerjalan + '</span> / ' + dataGajiLengkap.targetHari + ' Hari Menuju Pencairan';
            strukturHtmlBadgeSiklusHari += '</div>';

            // Jika hari berjalan telah memenuhi batas target, munculkan peringatan pencairan
            if (dataGajiLengkap.hariBerjalan >= dataGajiLengkap.targetHari) {
                strukturHtmlBadgeSiklusHari += `
                    <div style="background-color: var(--sukses-hijau-bg); color: var(--sukses-hijau-tua); padding: 12px; border-radius: 6px; font-weight: 800; font-size: 12px; margin-bottom: 16px; text-align: center; border: 1px dashed var(--sukses-hijau-tua); text-transform: uppercase;">
                        📢 SIKLUS PENUH! Segera Ajukan Klaim Pencairan Dana Gaji Dan Reset Data Ke Owner.
                    </div>`;
            }

            // Injeksi Template Desain Tabel Finansial Bersih Tanpa Ada Yang Dipotong
            elemenTargetBoxAreaGaji.innerHTML = `
                <div class="card-box">
                    <h2>Rincian Data Finansial</h2>
                    
                    ${strukturHtmlBadgeSiklusHari}
                    
                    <p style="font-size: 13px; margin-bottom: 15px; text-align: center; color: #555555; line-height: 1.4;">
                        Nama Anggota: <b>${dataGajiLengkap.nama}</b> [${dataGajiLengkap.jabatan}]<br>
                        Penempatan Cabang: <b>${dataGajiLengkap.cabang}</b>
                    </p>
                    
                    <table class="tabel-data-gaji">
                        <tr>
                            <td>Total Hasil Cucian</td>
                            <td class="teks-kanan teks-tebal">${akumulasiTotalUnitCuci} Unit</td>
                        </tr>
                        <tr>
                            <td>Upah Cuci Murni (x3.000)</td>
                            <td class="teks-kanan">Rp ${hasilUpahCuciMurniKaryawan.toLocaleString('id-ID')}</td>
                        </tr>
                        <tr>
                            <td style="color: var(--sukses-hijau-terang);">Klaim Tips Pelanggan</td>
                            <td class="teks-kanan" style="color: var(--sukses-hijau-terang);">+ Rp ${akumulasiTotalTipsMasuk.toLocaleString('id-ID')}</td>
                        </tr>
                        <tr>
                            <td style="color: var(--warning-oranye-tua);">Klaim Bonus Target</td>
                            <td class="teks-kanan" style="color: var(--warning-oranye-tua);">+ Rp ${akumulasiTotalBonusTarget.toLocaleString('id-ID')}</td>
                        </tr>
                        <tr>
                            <td style="color: #c62828;">Potongan Kasbon Harian</td>
                            <td class="teks-kanan" style="color: #c62828;">- Rp ${akumulasiTotalKasbonKaryawan.toLocaleString('id-ID')}</td>
                        </tr>
                        <tr>
                            <td style="color: #c62828;">Potongan Operational Wifi</td>
                            <td class="teks-kanan" style="color: #c62828;">- Rp ${totalPotonganOperationalWifi.toLocaleString('id-ID')}</td>
                        </tr>
                        <tr class="baris-total-bersih">
                            <td style="color: var(--steam-dark-solid);">TOTAL SISA TERIMA</td>
                            <td class="teks-kanan" style="color: var(--sukses-hijau-tua);">Rp ${totalNominalTerimaBersihAkhir.toLocaleString('id-ID')}</td>
                        </tr>
                    </table>

                    <div style="margin-top: 20px; border-top: 1px dashed #dddddd; padding-top: 5px;"></div>

                    <!-- STRUKTUR SKRIP TAMBAHAN BARU: SEKSI TOMBOL DARURAT SOS & KELUHAN OPERASIONAL -->
                    <button type="button" class="btn-aksi-sos-darurat" onclick="eksekusiPemicuSinyalSOSDaruratMendesak()">🚨 SOS Darurat Lapangan</button>
                    <button type="button" class="btn-aksi-keluhan-tim" onclick="eksekusiPemicuLaporanKeluhanInternalTim()">📝 Ajukan Pengaduan Tim</button>
                </div>
            `;
        }

        // FUNGSI TAMBAHAN BARU: Memancarkan Sinyal SOS Kritis Langsung Ke Sheet Pengaduan
        function eksekusiPemicuSinyalSOSDaruratMendesak() {
            let kronologiSituasiDarurat = prompt("🚨 PERINGATAN KRITIS OPERASIONAL LAPANGAN!\n\nMasukkan kronologi situasi darurat yang sedang terjadi (Contoh: Kerusakan Mesin Pompa Fatal / Keributan dengan Pelanggan / Kemalingan):");
            
            if (kronologiSituasiDarurat === null) { 
                return; 
            } 
            if (kronologiSituasiDarurat.trim() === "") {
                alert("Gagal! Kronologi situasi wajib diisi secara jelas agar Manajemen Pusat tidak bingung, Bos!");
                return;
            }

            tampilkanStatusSistemNotifikasi("Memancarkan sinyal darurat SOS secara live ke pusat data...", "loading");
            
            let idPenggunaSOS = SESSION_USER_DATA_ACTIVE.id;
            let namaPenggunaSOS = SESSION_USER_DATA_ACTIVE.nama;
            let cabangPenggunaSOS = SESSION_USER_DATA_ACTIVE.cabang || "Semua Cabang";
            
            let alamatUrlSOS = URL_GOOGLE_WEB_APP_SERVER + "?action=kirimPengaduan" +
                              "&idUser=" + idPenggunaSOS +
                              "&namaUser=" + encodeURIComponent(namaPenggunaSOS) +
                              "&cabangUser=" + encodeURIComponent(cabangPenggunaSOS) +
                              "&jenis=SOS DARURAT" +
                              "&isi=" + encodeURIComponent(kronologiSituasiDarurat);

            fetch(alamatUrlSOS)
            .then(function(responBalikanSOS) {
                return responBalikanSOS.json();
            })
            .then(function(jsonBalikanSOS) {
                if (jsonBalikanSOS.status === "success") {
                    tampilkanStatusSistemNotifikasi(jsonBalikanSOS.message, "success");
                    alert("🚨 SINYAL TRANSMISI SOS LIVE BERHASIL TERKIRIM!\n\nMohon tetap tenang di tempat aman. Manajemen pusat telah mendapatkan alarm notifikasi.");
                } else {
                    tampilkanStatusSistemNotifikasi(jsonBalikanSOS.message, "error");
                }
            })
            .catch(function(galatKoneksiSOS) {
                tampilkanStatusSistemNotifikasi("Sinyal SOS gagal memancar: " + galatKoneksiSOS.toString(), "error");
            });
        }

        // FUNGSI TAMBAHAN BARU: Mengirim Keluhan Fasilitas/Operasional Kerja Ke Sheet Pengaduan
        function eksekusiPemicuLaporanKeluhanInternalTim() {
            let isiTeksLaporanKeluhanTim = prompt("FORM PENGADUAN INTERNAL TIM:\n\nSilakan tulis keluhan, komplain operasional, atau pengajuan fasilitas cabang yang rusak secara rinci:");
            
            if (isiTeksLaporanKeluhanTim === null) { 
                return; 
            }
            if (isiTeksLaporanKeluhanTim.trim() === "") {
                alert("Gagal! Isi teks keluhan pengaduan tidak boleh dikirim dalam kondisi kosong.");
                return;
            }

            tampilkanStatusSistemNotifikasi("Mengirimkan lembar laporan pengaduan tim ke server...", "loading");
            
            let idPelaporKeluhan = SESSION_USER_DATA_ACTIVE.id;
            let namaPelaporKeluhan = SESSION_USER_DATA_ACTIVE.nama;
            let cabangPelaporKeluhan = SESSION_USER_DATA_ACTIVE.cabang || "Semua Cabang";

            let alamatUrlKeluhan = URL_GOOGLE_WEB_APP_SERVER + "?action=kirimPengaduan" +
                                 "&idUser=" + idPelaporKeluhan +
                                 "&namaUser=" + encodeURIComponent(namaPelaporKeluhan) +
                                 "&cabangUser=" + encodeURIComponent(cabangPelaporKeluhan) +
                                 "&jenis=KELUHAN KERJA" +
                                 "&isi=" + encodeURIComponent(isiTeksLaporanKeluhanTim);

            fetch(alamatUrlKeluhan)
            .then(function(responBalikanKeluhan) {
                return responBalikanKeluhan.json();
            })
            .then(function(jsonBalikanKeluhan) {
                if (jsonBalikanKeluhan.status === "success") {
                    tampilkanStatusSistemNotifikasi(jsonBalikanKeluhan.message, "success");
                    alert("✅ LAPORAN PENGADUAN SELESAI!\n\nData laporan komplain Anda telah aman diarsipkan dalam database untuk ditinjau oleh Owner.");
                } else {
                    tampilkanStatusSistemNotifikasi(jsonBalikanKeluhan.message, "error");
                }
            })
            .catch(function(galatKoneksiKeluhan) {
                tampilkanStatusSistemNotifikasi("Laporan keluhan gagal terkirim: " + galatKoneksiKeluhan.toString(), "error");
            });
        }

        // FUNGSI LOGIKA UTAMA: Pembersihan Sesi Menghapus Jejak Login Sisi Klien Saat Logout
        function eksekusiKeluarAplikasiSistem() {
            SESSION_USER_DATA_ACTIVE = null;
            
            // Pengosongan seluruh isian field login form awal
            document.getElementById('username').value = "";
            document.getElementById('sandi').value = "";
            
            // Pengembalian area visual box form login awal
            document.getElementById('panelDashboard').style.display = "none";
            document.getElementById('panelLogin').style.display = "block";
            
            hilangkanStatusSistemNotifikasi();
        }
    </script>
</body>
</html>

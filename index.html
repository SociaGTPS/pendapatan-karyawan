<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen Toko</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: #141414;
            --accent-color: #ff3333;
            --text-color: #ffffff;
            --text-muted: #888888;
            --success-color: #00ff66;
            --warning-color: #ffcc00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            border: 1px solid #222;
            margin-bottom: 20px;
        }

        h2 {
            font-size: 20px;
            margin-bottom: 20px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-color);
            border-left: 4px solid var(--accent-color);
            padding-left: 8px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background-color: #080808;
            border: 1px solid #333;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 8px rgba(255, 51, 51, 0.2);
        }

        input[disabled] {
            background-color: #1a1a1a;
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background-color: var(--accent-color);
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn:hover {
            background-color: #e02e2e;
            box-shadow: 0 4px 12px rgba(255, 51, 51, 0.3);
        }

        .btn:disabled {
            background-color: #555;
            cursor: not-allowed;
            box-shadow: none;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background-color: #141414;
            border: 1px solid #222;
            color: var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        #statusMessage {
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            font-weight: 500;
        }

        .status-success { background-color: rgba(0, 255, 102, 0.1); color: var(--success-color); border: 1px solid var(--success-color); }
        .status-error { background-color: rgba(255, 51, 51, 0.1); color: var(--accent-color); border: 1px solid var(--accent-color); }
        .status-loading { background-color: rgba(255, 204, 0, 0.1); color: var(--warning-color); border: 1px solid var(--warning-color); }

        .auth-footer {
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="statusMessage"></div>

        <div id="gerbangAuth">
            <div id="boxLogin" class="card">
                <h2>MASUK SISTEM</h2>
                <form id="formLogin" onsubmit="handleAuth(event, 'loginUser')">
                    <div class="form-group">
                        <label>ID KARYAWAN</label>
                        <input type="text" id="login_user" placeholder="Contoh: EMP-001" required>
                    </div>
                    <div class="form-group">
                        <label>KATA SANDI</label>
                        <input type="password" id="login_sandi" placeholder="Masukkan Sandi Anda" required>
                    </div>
                    <button type="submit" id="btn_login" class="btn">MASUK</button>
                </form>
                <div class="auth-footer">
                    Karyawan Baru? <a href="#" onclick="tukarAuth('daftar')">Daftar Di Sini</a>
                </div>
            </div>

            <div id="boxDaftar" class="card" style="display: none;">
                <h2>DAFTAR KARYAWAN</h2>
                <form id="formDaftar" onsubmit="handleAuth(event, 'registerUser')">
                    <div class="form-group">
                        <label>NAMA LENGKAP KARYAWAN</label>
                        <input type="text" id="reg_nama" placeholder="Masukkan Nama Sesuai KTP" required>
                    </div>
                    <button type="submit" id="btn_daftar" class="btn">DAFTARKAN</button>
                </form>
                <div class="auth-footer">
                    Sudah Punya ID? <a href="#" onclick="tukarAuth('login')">Masuk Di Sini</a>
                </div>
            </div>
        </div>

        <div id="halamanUtama" style="display: none;">
            <div class="nav-tabs">
                <button class="tab-btn active" onclick="switchTab('input-pemasukan')">Pemasukan</button>
                <button class="tab-btn" onclick="switchTab('input-pengeluaran')">Pengeluaran</button>
            </div>

            <div id="input-pemasukan" class="tab-content active">
                <div class="card">
                    <h2>INPUT PEMASUKAN UNIT</h2>
                    <form id="formPemasukan" onsubmit="submitData(event, 'Pemasukan')">
                        <div class="form-group">
                            <label>Tanggal</label>
                            <input type="date" id="tgl_pemasukan" required>
                        </div>
                        <div class="form-group">
                            <label>Cabang</label>
                            <select id="cabang_pemasukan" required>
                                <option value="Sukamulya 2">Sukamulya 2</option>
                                <option value="Sukamulya 4">Sukamulya 4</option>
                                <option value="Kresek 1">Kresek 1</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Jumlah Unit (Motor)</label>
                            <input type="number" id="unit_pemasukan" placeholder="0" oninput="hitungKotor()" required>
                        </div>
                        <div class="form-group">
                            <label>Total Nominal Terhitung</label>
                            <input type="hidden" id="nominal_pemasukan">
                            <input type="text" id="nominal_pemasukan_display" value="Rp 0" disabled>
                        </div>
                        <div class="form-group">
                            <label>Keterangan Tambahan</label>
                            <textarea id="ket_pemasukan" rows="2" placeholder="Catatan operasional..."></textarea>
                        </div>
                        <button type="submit" id="btn_submit_pemasukan" class="btn">SIMPAN DATA</button>
                    </form>
                </div>
            </div>

            <div id="input-pengeluaran" class="tab-content">
                <div class="card">
                    <h2>INPUT PENGELUARAN TOKO</h2>
                    <form id="formPengeluaran" onsubmit="submitData(event, 'Pengeluaran')">
                        <div class="form-group">
                            <label>Tanggal</label>
                            <input type="date" id="tgl_pengeluaran" required>
                        </div>
                        <div class="form-group">
                            <label>Cabang</label>
                            <select id="cabang_pengeluaran" required>
                                <option value="Sukamulya 2">Sukamulya 2</option>
                                <option value="Sukamulya 4">Sukamulya 4</option>
                                <option value="Kresek 1">Kresek 1</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Kategori Pengeluaran</label>
                            <select id="kategori_pengeluaran" required>
                                <option value="Beli Sabun / Semir">Beli Sabun / Semir</option>
                                <option value="Listrik / Air">Listrik / Air</option>
                                <option value="Maintenance Alat">Maintenance Alat</option>
                                <option value="Lain-lain">Lain-lain</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Nominal Pengeluaran (Rp)</label>
                            <input type="number" id="nominal_pengeluaran" placeholder="Contoh: 50000" required>
                        </div>
                        <div class="form-group">
                            <label>Keterangan Pengeluaran</label>
                            <textarea id="ket_pengeluaran" rows="2" placeholder="Detail barang yang dibeli..." required></textarea>
                        </div>
                        <button type="submit" id="btn_submit_pengeluaran" class="btn">SIMPAN PENGELUARAN</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxWBYtbeBe3-xH3R80axowIeVbI8n6fc-x3qwTbZammMY3dpsAOYR2y9DcD6R5AURaI/exec";

        window.onload = function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('tgl_pemasukan').value = today;
            document.getElementById('tgl_pengeluaran').value = today;
        };

        function tukarAuth(pilihan) {
            if (pilihan === 'daftar') {
                document.getElementById('boxLogin').style.display = 'none';
                document.getElementById('boxDaftar').style.display = 'block';
            } else {
                document.getElementById('boxDaftar').style.display = 'none';
                document.getElementById('boxLogin').style.display = 'block';
            }
        }

        // HANDLING LOGIN & PENDAFTARAN KARYAWAN (ID OTOMATIS)
        function handleAuth(event, tipeAksi) {
            event.preventDefault();
            let prm = new URLSearchParams();
            prm.append("action", tipeAksi);

            if (tipeAksi === 'loginUser') {
                document.getElementById('btn_login').disabled = true;
                showStatus("Memeriksa ID & Akses...", "loading");
                prm.append("username", document.getElementById('login_user').value); // ID Karyawan (EMP-XXX)
                prm.append("sandi", document.getElementById('login_sandi').value);
            } else {
                document.getElementById('btn_daftar').disabled = true;
                showStatus("Mendaftarkan karyawan baru...", "loading");
                prm.append("nama", document.getElementById('reg_nama').value);
                prm.append("username", "AUTO_GENERATE");
                prm.append("sandi", "PENDING_OWNER");
            }

            fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: prm.toString()
            })
            .then(() => {
                setTimeout(() => {
                    if (tipeAksi === 'loginUser') {
                        var cekUrl = WEB_APP_URL + "?action=loginUser&username=" + encodeURIComponent(document.getElementById('login_user').value) + "&sandi=" + encodeURIComponent(document.getElementById('login_sandi').value);
                        fetch(cekUrl).then(res => res.json()).then(resData => {
                            document.getElementById('btn_login').disabled = false;
                            if (resData.status === "success") {
                                showStatus("Akses Diterima! Memuat Lembar Gaji...", "success");
                                document.getElementById('gerbangAuth').style.display = 'none';
                                document.getElementById('halamanUtama').style.display = 'block';
                                
                                // RENDER BENTUK KOTAK REKAP GAJI KARYAWAN SECARA PRIVAT
                                tampilkanKotakGajiKaryawan(resData.gaji, resData.tarifUnit, resData.potonganWifi);
                            } else {
                                showStatus(resData.message, "error");
                            }
                        }).catch(() => {
                            document.getElementById('btn_login').disabled = false;
                            showStatus("ID belum AKTIF atau kombinasi Sandi salah.", "error");
                        });
                    } else {
                        document.getElementById('btn_daftar').disabled = false;
                        showStatus("Pendaftaran Berhasil! ID dibuat otomatis. Menunggu Persetujuan & Set Sandi oleh Owner.", "success");
                        tukarAuth('login');
                        document.getElementById('formDaftar').reset();
                    }
                }, 1500);
            })
            .catch(err => {
                showStatus("Gagal terhubung ke server.", "error");
                document.getElementById('btn_login').disabled = false;
                document.getElementById('btn_daftar').disabled = false;
            });
        }

        // GENERATE KOTAK REKAP GAJI PRIVAT PERSIS FORMAT YANG ANDA INGINKAN
        function tampilkanKotakGajiKaryawan(dataGaji, tarifUnit, potonganWifi) {
            let totalUnit = 0, totalTips = 0, totalBonus = 0, totalKasbon = 0;
            let jumlahHariKerja = dataGaji.length; // Menghitung total hari kerja aktif di sheet
            
            dataGaji.forEach(item => {
                totalUnit += parseInt(item.unit);
                totalTips += parseInt(item.tips);
                totalBonus += parseInt(item.bonus);
                totalKasbon += parseInt(item.kasbon);
            });

            // Hitungan Gaji Kotor ditarik otomatis dari parameter Pengaturan (3000)
            let gajiKotorUnit = totalUnit * parseInt(tarifUnit); 
            // Potongan WiFi wajib dikali jumlah hari kerja aktif dari database (1000/hari)
            let totalPotonganWifi = jumlahHariKerja * parseInt(potonganWifi); 
            let totalGajiBersih = (gajiKotorUnit + totalTips + totalBonus) - totalKasbon - totalPotonganWifi;
            
            // Layout Kotak Rekap Hitam Cantik Sesuai Request Gambar Tanpa Merubah CSS Utama
            let htmlKotak = `
                <div class="card" style="background: #111; color: #fff; border: 2px solid var(--accent-color); margin-bottom: 25px; padding: 20px; border-radius: 8px;">
                    <h3 style="color: #fff; border-left: 4px solid var(--accent-color); padding-left: 10px; margin-bottom: 15px; font-size: 16px;">KOTAK REKAP REKENING GAJI PRIVAT</h3>
                    <div style="overflow-x: auto;">
                        <table style="width: 100%; border-collapse: collapse; min-width: 280px; color: #fff; font-size: 13px;">
                            <thead>
                                <tr style="border-bottom: 2px solid #333; text-align: left; background: #1a1a1a;">
                                    <th style="padding: 10px 5px;">UNIT</th>
                                    <th style="padding: 10px 5px;">TIPS</th>
                                    <th style="padding: 10px 5px;">BONUS</th>
                                    <th style="padding: 10px 5px;">KASBON</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr style="background: #222; border-bottom: 1px solid #333;">
                                    <td style="padding: 12px 5px;">${totalUnit}</td>
                                    <td style="padding: 12px 5px;">Rp ${totalTips.toLocaleString('id-ID')}</td>
                                    <td style="padding: 12px 5px;">Rp ${totalBonus.toLocaleString('id-ID')}</td>
                                    <td style="padding: 12px 5px; color: #ff5252;">Rp ${totalKasbon.toLocaleString('id-ID')}</td>
                                </tr>
                                <tr style="background: #fffb15; color: #000; font-weight: bold; border-bottom: 1px solid #333;">
                                    <td style="padding: 10px 5px;">JUMLAH</td>
                                    <td style="padding: 10px 5px;">${totalUnit}</td>
                                    <td style="padding: 10px 5px;">${totalTips > 0 ? 'Ada' : '0'}</td>
                                    <td style="padding: 10px 5px; color: #c62828;">- Rp ${totalKasbon.toLocaleString('id-ID')}</td>
                                </tr>
                                <tr style="background: #00e676; color: #000; font-weight: bold;">
                                    <td style="padding: 12px 5px;">TOTAL</td>
                                    <td style="padding: 12px 5px;">Rp ${totalGajiBersih.toLocaleString('id-ID')}</td>
                                    <td colspan="2" style="padding: 12px 5px; font-size: 10px; background: #1a1a1a; color: #aaa; text-align: center; font-weight: normal; border: 1px solid #333;">
                                        WIFI Rp ${parseInt(potonganWifi).toLocaleString('id-ID')} / Hari (${jumlahHariKerja} Hari Kerja = -Rp ${totalPotonganWifi.toLocaleString('id-ID')})
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            
            // Tempel di atas halaman agar karyawan langsung disambut kotak gajinya
            let kontainerUtama = document.querySelector('.container');
            if (kontainerUtama) {
                kontainerUtama.insertAdjacentHTML('afterbegin', htmlKotak);
            }
            
            // Karyawan biasa dikunci aksesnya agar tidak bisa input/melihat data operasional utama toko
            let navTabs = document.querySelector('.nav-tabs');
            let formInput = document.getElementById('input-pemasukan');
            if (navTabs) navTabs.style.display = 'none';
            if (formInput) formInput.style.display = 'none';
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function hitungKotor() {
            const unitInput = document.getElementById('unit_pemasukan').value;
            const tarifPerUnit = 3000; // Log input kotor harian toko disesuaikan ke parameter 3000
            const totalNominal = unitInput ? parseInt(unitInput) * tarifPerUnit : 0;
            document.getElementById('nominal_pemasukan').value = totalNominal;
            document.getElementById('nominal_pemasukan_display').value = "Rp " + totalNominal.toLocaleString('id-ID');
        }

        function showStatus(text, type) {
            const msgBox = document.getElementById('statusMessage');
            msgBox.innerText = text;
            msgBox.className = ''; 
            if(type === 'success') msgBox.classList.add('status-success');
            else if(type === 'error') msgBox.classList.add('status-error');
            else if(type === 'loading') msgBox.classList.add('status-loading');
            msgBox.style.display = 'block';
            if(type !== 'loading') {
                setTimeout(() => { msgBox.style.display = 'none'; }, 4000);
            }
        }

        function submitData(event, tipeForm) {
            event.preventDefault();
            let btnSubmit, urlParams = new URLSearchParams();
            
            const formatTglLokal = (tglStr) => {
                if(!tglStr) return "";
                const d = new Date(tglStr);
                return `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth()+1).padStart(2, '0')}/${d.getFullYear()}`;
            };

            showStatus("Sedang menyimpan data ke Google Sheets...", "loading");
            urlParams.append("action", "insertRow");
            urlParams.append("tipe", tipeForm);

            if (tipeForm === 'Pemasukan') {
                btnSubmit = document.getElementById('btn_submit_pemasukan');
                btnSubmit.disabled = true;
                const rawDate = document.getElementById('tgl_pemasukan').value;
                
                urlParams.append("tanggal", formatTglLokal(rawDate));
                urlParams.append("cabang", document.getElementById('cabang_pemasukan').value);
                urlParams.append("kategori", "Pemasukan Unit");
                urlParams.append("unit", document.getElementById('unit_pemasukan').value);
                urlParams.append("nominal", document.getElementById('nominal_pemasukan').value);
                urlParams.append("keterangan", document.getElementById('ket_pemasukan').value || "Pemasukan rutin");
                urlParams.append("tanggal_asli", rawDate);
            } else {
                btnSubmit = document.getElementById('btn_submit_pengeluaran');
                btnSubmit.disabled = true;
                const rawDate = document.getElementById('tgl_pengeluaran').value;
                
                urlParams.append("tanggal", formatTglLokal(rawDate));
                urlParams.append("cabang", document.getElementById('cabang_pengeluaran').value);
                urlParams.append("kategori", document.getElementById('kategori_pengeluaran').value);
                urlParams.append("unit", "0");
                urlParams.append("nominal", document.getElementById('nominal_pengeluaran').value);
                urlParams.append("keterangan", document.getElementById('ket_pengeluaran').value);
                urlParams.append("tanggal_asli", rawDate);
            }

            fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/x-www-form-urlencoded" },
                body: urlParams.toString()
            })
            .then(() => {
                showStatus("Data " + tipeForm + " Berhasil Disimpan!", "success");
                if (tipeForm === 'Pemasukan') {
                    document.getElementById('formPemasukan').reset();
                    document.getElementById('nominal_pemasukan_display').value = "Rp 0";
                } else {
                    document.getElementById('formPengeluaran').reset();
                }
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('tgl_pemasukan').value = today;
                document.getElementById('tgl_pengeluaran').value = today;
                btnSubmit.disabled = false;
            })
            .catch(error => {
                console.error("Error:", error);
                showStatus("Gagal mengirim data.", "error");
                btnSubmit.disabled = false;
            });
        }
    </script>
</body>
</html>
